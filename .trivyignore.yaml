---
# Trivy SARIF filter — path-scoped suppressions for known false positives.
# See: https://aquasecurity.github.io/trivy/latest/docs/configuration/filtering/
misconfigurations:
  - id: KSV-0109
    paths:
      - "kubernetes/apps/observability/oxidized/app/configmap.yaml"
      - "kubernetes/apps/infrastructure/certwarden/cert-deployment/apc/scripts-configmap.yaml"
    statement: |
      False positive. oxidized/configmap.yaml: the YAML schema requires
      top-level 'username' and 'password' keys; the values here are literal
      'placeholder' strings, not secrets. Real device credentials come from
      oxidized-secret (rendered by the ExternalSecret) into a Secret-mounted
      router.db. The 'token=' is a curl --form-string flag in a Pushover
      hook, not a secret value.
      certwarden/apc/scripts-configmap.yaml: the ConfigMap holds an embedded
      Python script that reads APC_PASSWORD / APC_USERNAME from env vars
      (populated via envFrom from an ExternalSecret-rendered Secret); the
      literal strings Trivy matches (`export APC_PASSWORD`, `self.password`,
      `password`) are variable / parameter NAMES inside the script, not values.

  - id: KSV-01010
    paths:
      - "kubernetes/apps/observability/oxidized/app/configmap.yaml"
      - "kubernetes/apps/infrastructure/certwarden/cert-deployment/apc/scripts-configmap.yaml"
    statement: |-
      False positive. oxidized/configmap.yaml: flagged keys (username, email,
      remote_repo) are config field names, not sensitive content. The git
      commit author email and the public GitHub remote URL for the
      network-configs repo are non-sensitive.
      certwarden/apc/scripts-configmap.yaml: same pattern as KSV-0109 above
      — the strings (`echo "APC Username`, `export APC_USERNAME`,
      `self.username`, `username`) are variable / parameter names inside
      an embedded Python script, not actual usernames.

  # The cloudflare-runner Role grants the ARC kubernetes-mode container-hook
  # permissions (manage pods, pods/exec, pods/log, jobs, secrets in
  # actions-runner-system). Terrateam's action is a container action, so the
  # runner MUST spawn/exec/clean up its job pod + per-job secret — these verbs
  # are required, minimal, and namespace-scoped. Not reducible.
  - id: KSV-0048
    paths:
      - "kubernetes/apps/actions-runner-system/actions-runner-controller/runners/cloudflare/rbac.yaml"
    statement: |-
      Required ARC kubernetes-mode container-hook RBAC: the runner spawns and
      deletes the workload pod/job for Terrateam's container action. Scoped to
      the actions-runner-system namespace.
  - id: KSV-0053
    paths:
      - "kubernetes/apps/actions-runner-system/actions-runner-controller/runners/cloudflare/rbac.yaml"
    statement: |-
      Required ARC kubernetes-mode container-hook RBAC: the runner execs into
      its own job pod to stream the action. Scoped to actions-runner-system.
  - id: KSV-0113
    paths:
      - "kubernetes/apps/actions-runner-system/actions-runner-controller/runners/cloudflare/rbac.yaml"
    statement: |-
      Required ARC kubernetes-mode container-hook RBAC: the hook creates and
      deletes a per-job secret to inject the workflow context. Scoped to
      actions-runner-system.

  - id: KSV-0046
    paths:
      - "kubernetes/apps/ai/toolhive/mcp-servers/kubectl/rbac.yaml"
    statement: |-
      Intentional read-only ClusterRole. kubectl-mcp-readonly grants only
      get/list/watch for the kubectl + flux MCP servers. resources: ["*"]
      applies to non-core API groups only (Secret objects live in the core
      "" group, which is listed explicitly with `secrets` omitted). The
      breadth lets the MCP inspect any CRD; no write or management verbs.

  - id: KSV-0108
    paths:
      - "kubernetes/apps/observability/seedbox/app/egress.yaml"
    statement: |-
      Intentional ExternalName Service: this is the tailscale-operator egress
      pattern. The operator replaces `externalName: placeholder` with its own
      tailnet proxy so cluster workloads (Prometheus) can reach the seedbox's
      tailnet IP. No user traffic is routed to an attacker-controllable
      external name; the operator manages the value.
