[settings]
# Pin exact tool versions + checksums + provenance in mise.lock for
# reproducible, verified installs across machines and CI.
lockfile = true

[env]
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
JUST_UNSTABLE = "1"
KUBECONFIG = "{{config_root}}/kubeconfig"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
TALOS_DIR = "{{config_root}}/talos"
_.python.venv = {path = "{{config_root}}/.venv", create = true}

[tasks.deps]
description = "Install Python dependencies"
run = "uv pip install -r requirements.txt"

[tools]
"aqua:budimanjojo/talhelper" = "3.1.13"
# ≥1.52 required by the justfiles (default-list/default-script settings;
# recipe_name() needs 1.53). Explicit pin so Renovate manages bumps.
"aqua:casey/just" = "1.57.0"
"aqua:charmbracelet/gum" = "latest"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.7.2"
"aqua:cue-lang/cue" = "0.17.1"
# editorconfig-checker / yamllint / codespell / markdownlint-cli mirror the
# linters super-linter v8 bundles, so lefthook catches their findings locally
# before CI. Versions pinned to match super-linter@9e863354 (v8): bumping
# super-linter may require bumping these in lockstep to avoid local/CI drift.
"aqua:editorconfig-checker/editorconfig-checker" = "3.8.0"
"aqua:fluxcd/flux2" = "2.9.2"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:helm/helm" = "4.2.3"
"aqua:helmfile/helmfile" = "1.7.1"
"aqua:helmfile/vals" = "latest"
"aqua:jqlang/jq" = "1.7.1"
"aqua:koalaman/shellcheck" = "latest"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.2"
"aqua:mitsuhiko/minijinja" = "latest"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:rhysd/actionlint" = "latest"
"aqua:siderolabs/talos" = "1.13.7"
"aqua:yannh/kubeconform" = "0.8.0"
"aqua:zizmorcore/zizmor" = "1.28.0"
"github:home-operations/flate" = "latest"
"github:home-operations/yayamlls" = "latest"
python = "3.14.6"
uv = "0.11.30"
# Exact pins (not ranges): an in-range update is LOCKFILE-ONLY for Renovate,
# and that artifact path fails on Mend hosted — the node/prettier
# "-lockfile" branches errored on every dashboard tick while ordinary
# bump-toml+lock updates (e.g. just 1.57.0, #3601) work fine. Every other
# tool here is exact-pinned already; keep it that way.
node = "24.18.0"
"npm:markdownlint-cli" = "0.49.1"
"npm:prettier" = "3.9.6"
"pipx:codespell" = "2.4.3"
"pipx:yamllint" = "1.38.0"
