[settings]
# Pin exact tool versions + checksums + provenance in mise.lock for
# reproducible, verified installs across machines and CI.
lockfile = true

[env]
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
JUST_UNSTABLE = "1"
KUBECONFIG = "{{config_root}}/kubeconfig"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
TALOS_DIR = "{{config_root}}/talos"
_.python.venv = {path = "{{config_root}}/.venv", create = true}

[tasks.deps]
description = "Install Python dependencies"
run = "uv pip install -r requirements.txt"

[tools]
"aqua:FiloSottile/age" = "1.3.1"
"aqua:budimanjojo/talhelper" = "3.1.10"
"aqua:casey/just" = "latest"
"aqua:charmbracelet/gum" = "latest"
"aqua:cli/cli" = "2.93.0"
"aqua:cloudflare/cloudflared" = "2026.5.2"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.2"
"aqua:helmfile/vals" = "latest"
"aqua:jqlang/jq" = "1.7.1"
"aqua:koalaman/shellcheck" = "latest"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.1"
"aqua:mitsuhiko/minijinja" = "latest"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:rhysd/actionlint" = "latest"
"aqua:siderolabs/talos" = "1.13.3"
"aqua:yannh/kubeconform" = "0.8.0"
"aqua:zizmorcore/zizmor" = "1.25.2"
"github:home-operations/flate" = "latest"
python = "3.14.5"
uv = "0.11.19"
node = "24"
"npm:prettier" = "3"
