---
apiVersion: v1alpha1
kind: ImageVerificationConfig
rules:
  - image: "ghcr.io/siderolabs/*"
    keyless:
      issuer: "https://token.actions.githubusercontent.com"
      subjectRegex: "^https://github\\.com/siderolabs/[^/]+/\\.github/workflows/[^/]+@refs/(tags/v[0-9].+|heads/release-[0-9].+)$"
