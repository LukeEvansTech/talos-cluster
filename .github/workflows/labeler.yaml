---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Labeler"

on:
  workflow_dispatch:
  # zizmor: ignore[dangerous-triggers]
  # actions/labeler must write PR labels, including for PRs from forks
  # where pull_request's GITHUB_TOKEN is read-only. This workflow does
  # not check out PR code or run any PR-supplied commands, so the
  # fork-content-injection risk this audit flags does not apply.
  pull_request_target:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Labeler
        uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          configuration-path: .github/labeler.yaml
