---
# Canonical docs workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows zensical reusable.
# Build-only repos override `publish: false`.
name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: LukeEvansTech/shared-workflows/.github/workflows/zensical.yml@8fd92dc677d0ca251d3a287e7a0077df201f8135 # v1
    with:
      publish: ${{ github.event_name != 'pull_request' }}
