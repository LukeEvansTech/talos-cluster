---
name: security-scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # nightly at 3 AM UTC

# Top-level: read-only by default. The reusable workflow widens per job.
permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
    uses: LukeEvansTech/shared-workflows/.github/workflows/security-scans.yml@8fd92dc677d0ca251d3a287e7a0077df201f8135 # v1
    # Defaults match this repo's prior inline config: framework=kubernetes,helm,
    # severity=CRITICAL,HIGH,MEDIUM, scanners=vuln,secret,misconfig,
    # trivyignore=.trivyignore.yaml. Override here if drift becomes desirable.
