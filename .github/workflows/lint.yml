---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@c0a84f2a9f307fdfa394681ab5ff30f7de78b702 # v1
    with:
      # Kubeconform validates raw YAML source. On this Flux GitOps repo the
      # source is meaningless until kustomize substitutes vars
      # (${SECRET_DOMAIN}, ${SVC_*_ADDR}, ...) and merges components — so it
      # false-positives on every CRD-shaped file regardless of schema config.
      # Real K8s validation lives in flate (kustomize build pipeline).
      validate-kubernetes-kubeconform: false
      # Graduate to blocking: with kubeconform off, the remaining super-linter
      # checks (yamllint, prettier, actionlint, shellcheck, ...) are clean.
      soft-launch: false
      # The zensical docs tree (docs/) is owned by the canonical .markdownlint.yml
      # + the docs-standard-check (drift) workflow, which use MD007 indent 2.
      # Exclude it here so super-linter's indent-4 markdown config doesn't
      # double-lint it with a conflicting rule. docs/superpowers/ is gitignored.
      filter-regex-exclude: '(^|/)(node_modules|\.venv|site)/|(^|/)docs/'
