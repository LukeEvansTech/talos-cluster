---
# Canonical docs-standard-check workflow.
# Calls the zensical-drift-check reusable on every PR touching docs/ or workflows.
# Build-only repos override `allow-no-pages: true`.
name: Docs Standard Check

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/**"
      - "renovate.json"
      - ".markdownlint.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    uses: LukeEvansTech/shared-workflows/.github/workflows/zensical-drift-check.yml@c0a84f2a9f307fdfa394681ab5ff30f7de78b702 # v1
