---
# Canonical docs-standard-check workflow.
# Calls the zensical-drift-check reusable on every PR touching docs/ or workflows.
# Build-only repos override `allow-no-pages: true`.
name: Docs Standard Check

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/**"
      - ".renovaterc.json5"
      - ".markdownlint.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    uses: LukeEvansTech/shared-workflows/.github/workflows/zensical-drift-check.yml@ceee688a491289ee740499ed6d2aec30cbef84ea # v1
