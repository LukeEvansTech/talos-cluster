---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # External Konflate URL — set via repo variable KONFLATE_URL
  # (e.g. https://konflate.<your-domain>). Falls back to the in-cluster
  # service URL if the variable is not set (self-hosted runner path).
  KONFLATE_URL: ${{ vars.KONFLATE_URL || 'http://konflate.flux-system.svc.cluster.local:8080' }}

jobs:
  comment:
    name: Konflate - Comment
    # Same-repo PRs only: Konflate renders against our cluster state so there
    # is no value running it for external forks, and the fallback path still
    # uses a self-hosted runner.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ${{ vars.KONFLATE_URL && 'ubuntu-latest' || 'talos-cluster-runner' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Renders are triggered by the GitHub webhook (HMAC-validated POST
      # /hooks via the konflate-webhook HTTPRoute); the 15m poll remains as
      # the missed-webhook backstop. This job only consumes the summary.
      - name: Fetch rendered summary
        id: fetch
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          # The markdown summary answers 503 + Retry-After while a render is in
          # flight, so curl --retry waits the render out. Skip (don't fail) if
          # konflate is unreachable — flate.yaml remains the blocking check.
          if status="$(curl -fsS --retry 15 --retry-delay 5 --retry-all-errors \
              -H 'Accept: text/markdown' \
              -o summary.md -w '%header{x-konflate-render-status}' \
              "${KONFLATE_URL}/api/prs/${PR}/summary")" \
            && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "konflate summary unavailable or empty — skipping; next push retries."
          fi

      - name: Read Summary
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        id: summary
        run: |
          {
            echo 'body<<KONFLATE_EOF'
            cat summary.md
            echo 'KONFLATE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Add Comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: konflate
          message: ${{ steps.summary.outputs.body }}

      - name: Fail on render issue
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |-
          case "$STATUS" in
            ok)        echo "konflate render: ok" ;;
            # 'failures' = individual resources couldn't render (e.g. private
            # GitRepository source not simulated). Known false positive on every
            # PR due to shelly-fleet-sync cascade — warn but don't block merges.
            failures)  echo "::warning::konflate render: one or more resources failed to render" ;;
            error)     echo "::error::konflate render: render errored (no diff)"; exit 1 ;;
            *)         echo "::warning::konflate render: unexpected status '${STATUS}'" ;;
          esac
