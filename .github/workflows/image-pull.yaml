---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Image Pull"

on:
  pull_request:
    branches:
      - "main"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=home-operations/flate
  FLATE_VERSION: "0.2.3"

jobs:
  filter:
    name: Filter
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          files: kubernetes/**

  extract:
    name: Extract Images
    runs-on: ubuntu-latest
    needs: filter
    if: ${{ needs.filter.outputs.any_changed == 'true' }}
    permissions:
      contents: read
      packages: read
    outputs:
      default_images: ${{ steps.set-outputs.outputs.default_images }}
      pull_images: ${{ steps.set-outputs.outputs.pull_images }}
    steps:
      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: default
          persist-credentials: false

      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false

      - name: Install flate
        run: |
          curl -fsSL "https://github.com/home-operations/flate/releases/download/${FLATE_VERSION}/flate_${FLATE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin flate

      - name: Authenticate to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Extract Images from Default Branch
        run: |
          flate get images \
            --path default/kubernetes/flux/cluster \
            --allow-missing-secrets \
            --output json > /tmp/default-images.json

      - name: Extract Images from Pull Request Branch
        run: |
          flate get images \
            --path pull/kubernetes/flux/cluster \
            --allow-missing-secrets \
            --output json > /tmp/pull-images.json

      - name: Set Outputs
        id: set-outputs
        run: |
          # flate `get images -o json` emits a flat JSON array of image strings.
          DEFAULT_IMAGES=$(jq -c 'unique' /tmp/default-images.json)
          PULL_IMAGES=$(jq -c 'unique' /tmp/pull-images.json)
          {
            echo "default_images=${DEFAULT_IMAGES}"
            echo "pull_images=${PULL_IMAGES}"
          } >> "$GITHUB_OUTPUT"

  diff:
    name: Diff Images
    runs-on: ubuntu-latest
    needs: extract
    outputs:
      new_images: ${{ steps.diff.outputs.new_images }}
      has_new_images: ${{ steps.diff.outputs.has_new_images }}
    steps:
      - name: Compare Image Lists
        id: diff
        env:
          DEFAULT_IMAGES_JSON: ${{ needs.extract.outputs.default_images }}
          PULL_IMAGES_JSON: ${{ needs.extract.outputs.pull_images }}
        run: |
          # Find new images (in pull but not in default).
          # Read job outputs from env, not template interpolation, to avoid
          # zizmor template-injection (untrusted output → shell).
          NEW_IMAGES=$(jq -n \
            --argjson default "${DEFAULT_IMAGES_JSON}" \
            --argjson pull "${PULL_IMAGES_JSON}" \
            '$pull - $default')

          echo "new_images=${NEW_IMAGES}" >> "$GITHUB_OUTPUT"

          IMAGE_COUNT=$(echo "${NEW_IMAGES}" | jq 'length')
          if [ "${IMAGE_COUNT}" -gt 0 ]; then
            echo "has_new_images=true" >> "$GITHUB_OUTPUT"
            {
              echo "### New Images to Pull"
              echo '```json'
              echo "${NEW_IMAGES}" | jq .
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_new_images=false" >> "$GITHUB_OUTPUT"
            echo "No new images to pull" >> "$GITHUB_STEP_SUMMARY"
          fi

  pull:
    name: Pull Images
    runs-on: talos-cluster-runner
    needs: diff
    if: ${{ needs.diff.outputs.has_new_images == 'true' }}
    strategy:
      matrix:
        image: ${{ fromJson(needs.diff.outputs.new_images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Install Talosctl
        run: |
          curl -sL https://talos.dev/install | sh

      - name: Pull Image
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          echo "Pulling image: $IMAGE"
          talosctl image pull "$IMAGE" \
            --nodes 10.32.8.80,10.32.8.81,10.32.8.82 \
            --talosconfig ~/.talos/config

  success:
    name: Image Pull Success
    runs-on: ubuntu-latest
    needs:
      - "filter"
      - "extract"
      - "diff"
      - "pull"
    if: ${{ always() }}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          NEEDS_RESULTS_JSON: ${{ toJSON(needs.*.result) }}
        run: |-
          echo "All jobs passed or skipped"
          echo "$NEEDS_RESULTS_JSON"
