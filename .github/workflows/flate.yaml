---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flate"

on:
  pull_request:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # flate v0.4.6 fixed the skip→blocked cascade where the unresolvable private
  # shelly-fleet GitRepository (SSH deploy key only exists at runtime) blocked
  # every dependent (~209) under the v0.3.4–0.4.5 DAG scheduler. Fix shipped in
  # v0.4.6 via home-operations/flate#757 (closes #752). Keep the annotation
  # directly above the value below so Renovate targets FLATE_VERSION, not this
  # comment.
  # renovate: datasource=github-releases depName=home-operations/flate
  FLATE_VERSION: "v0.4.6"

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install flate
        run: |
          # Tag carries the leading "v" (v0.3.2); goreleaser strips it from the
          # asset filename (flate_0.3.2_...). Keep ${FLATE_VERSION} in the path,
          # use ${FLATE_VERSION#v} for the filename so both v- and bare-version
          # tags resolve.
          curl -fsSL "https://github.com/home-operations/flate/releases/download/${FLATE_VERSION}/flate_${FLATE_VERSION#v}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin flate

      - name: Authenticate to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Run flate test
        run: |
          # flate test is occasionally flaky: it intermittently exits non-zero with
          # "0 failed" in the output (substitution-cache nondeterminism). Retry once
          # before declaring a real failure.
          flate test all \
            --path kubernetes/flux/cluster --allow-missing-secrets && exit 0
          echo "::warning title=flate::flate test failed; retrying once (flate is occasionally flaky)"
          flate test all \
            --path kubernetes/flux/cluster --allow-missing-secrets

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: default
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Install flate
        run: |
          # Tag carries the leading "v" (v0.3.2); goreleaser strips it from the
          # asset filename (flate_0.3.2_...). Keep ${FLATE_VERSION} in the path,
          # use ${FLATE_VERSION#v} for the filename so both v- and bare-version
          # tags resolve.
          curl -fsSL "https://github.com/home-operations/flate/releases/download/${FLATE_VERSION}/flate_${FLATE_VERSION#v}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin flate

      - name: Authenticate to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Run flate diff
        env:
          RESOURCE: ${{ matrix.resource }}
        run: |
          # flate uses short kind names (hr/ks); keep the matrix values verbose
          # so the job/check names stay descriptive (Renovate auto-merge gates on
          # all checks green, so the names just need to be stable + readable).
          case "${RESOURCE}" in
            helmrelease) KIND=hr ;;
            kustomization) KIND=ks ;;
            *) KIND="${RESOURCE}" ;;
          esac
          : > diff.md
          rc=0
          flate diff "${KIND}" \
            --path pull/kubernetes/flux/cluster \
            --path-orig default/kubernetes/flux/cluster \
            --strip-attr caBundle \
            --allow-missing-secrets \
            --output github >> diff.md || rc=1
          # Cap to stay within GitHub's ~65k-char comment limit
          if [ "$(wc -c < diff.md)" -gt 60000 ]; then
            head -c 60000 diff.md > diff.trunc && mv diff.trunc diff.md
            printf '\n\n_…diff truncated; see workflow logs for the full output._\n' >> diff.md
          fi
          exit "${rc}"

      - name: Read Diff
        id: diff
        run: |
          {
            echo 'diff<<EOF'
            cat diff.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
          message: ${{ steps.diff.outputs.diff }}

  success:
    if: ${{ !cancelled() }}
    needs:
      - test
      - diff
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        env:
          NEEDS_RESULTS_JSON: ${{ toJSON(needs.*.result) }}
        run: |-
          echo "All jobs passed or skipped"
          echo "$NEEDS_RESULTS_JSON"
