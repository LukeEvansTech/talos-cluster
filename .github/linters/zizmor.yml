---
# zizmor config — https://docs.zizmor.sh/configuration/
# Suppress a known-required pattern that zizmor flags as dangerous:
#
#   labeler.yaml uses `pull_request_target` because actions/labeler must
#   write PR labels, including on PRs from forks where `pull_request`
#   has read-only GITHUB_TOKEN. The workflow does not check out PR code
#   or run any PR-supplied commands, so the fork-content-injection risk
#   that motivates this audit does not apply.
rules:
  dangerous-triggers:
    ignore:
      - labeler.yaml
