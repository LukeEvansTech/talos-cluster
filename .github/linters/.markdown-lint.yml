---
# Super-linter markdownlint config.
# Merges super-linter's bundled defaults (line_length=400, etc.) with two
# overrides this repo needs:
#   - MD007.indent = 4 to match .editorconfig's `[*.md] indent_size = 4`
#   - MD024.siblings_only so docs/known-issues.md can reuse "Issue / Root Cause /
#     Verification / References / Resolution Status" subheadings under multiple
#     parent ## issues.

###############
# Rules by id #
###############
MD004: false # Unordered list style
MD007:
  indent: 4 # Match .editorconfig [*.md] indent_size = 4
MD013:
  line_length: 1000 # Line length 80 is far too short; raised to 1000 so long planning-doc paragraphs and table rows aren't flagged
MD028: false # Blank line inside blockquote — adjacent callout-style blockquotes separated by a blank are intentional in planning docs
MD024:
  siblings_only: true # Allow repeated subheadings under different parents
MD026:
  punctuation: ".,;:!。，；:" # Punctuation chars not allowed at end of headings
MD029: false # Ordered list item prefix
MD033: false # Allow inline HTML
MD036: false # Emphasis used instead of a heading
MD041: false # First line in file should be a top-level heading (root README starts with <div align="center">)

#################
# Rules by tags #
#################
blank_lines: false
