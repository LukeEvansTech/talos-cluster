---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  # Placeholder cluster-secrets so CI (flate) can render ${VAR} substitutions —
  # load-bearing: charts with values.schema.json or LB IPs reject empty values.
  # ExternalSecret overwrites it with real values in-cluster.
  - ./cluster-secrets.yaml
  - ./cluster-secrets-externalsecret.yaml
  # Non-secret cluster-wide settings (Git-tracked, no ExternalSecret needed).
  - ./cluster-settings.yaml
