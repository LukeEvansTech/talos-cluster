---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/pushsecret_v1alpha1.json
# Placeholder cluster-secrets so CI (flate) can render ${VAR} substitutions
# These values are placeholders - real values come from ExternalSecret in production
apiVersion: v1
kind: Secret
metadata:
  name: cluster-secrets
  annotations:
    # Namespace is provided by Kustomize component usage
    checkov.io/skip1: CKV_K8S_21=Namespace provided by kustomization overlay
stringData:
  CLUSTER_PODS_CIDR: "10.244.0.0/16"
  CLUSTER_SVCS_CIDR: "10.245.0.0/16"
  CLOUDFLARE_TUNNEL_ID: "00000000-0000-0000-0000-000000000000"
  CR_LAN_CIDR: "10.0.0.0/24"
  ENVOY_INTERNAL_IP: "10.0.0.1"
  ENVOY_EXTERNAL_IP: "10.0.0.2"
  GH_LAN_CIDR: "10.0.1.0/24"
  SECRET_ACME_EMAIL: "fake@example.com"
  SECRET_DOMAIN: "example.com"
  SECRET_INTERNAL_DOMAIN: "internal.example.com"
  SECRET_STORAGE_SERVER: "storage.example.com"
  SECRET_STORAGE_SERVER_DOWNLOADS_NFS: "/mnt/downloads"
  SECRET_STORAGE_SERVER_MOVIES4K_NFS: "/mnt/movies4k"
  SECRET_STORAGE_SERVER_MOVIES_NFS: "/mnt/movies"
  SECRET_STORAGE_SERVER_TV4K_NFS: "/mnt/tv4k"
  SECRET_STORAGE_SERVER_TV_NFS: "/mnt/tv"
  SECRET_STORAGE_SERVER_VOLSYNC_NFS: "/mnt/volsync"
  SECRET_VSPHERE_ENDPOINT: "vcenter.example.com"
  IOT_NETWORK_CIDR: "10.0.0.0/24"
  IOT_TRUSTED_NETWORK_CIDR: "10.0.2.0/23"
  SVC_MOSQUITTO_ADDR: "10.0.0.10"
  SVC_PLEX_ADDR: "10.0.0.11"
  SVC_POSTGRES_ADDR: "10.0.0.12"
  SVC_SATISFACTORY_ADDR: "10.0.0.13"
  SVC_SMTP_RELAY_ADDR: "10.0.0.14"
  SVC_VLMCSD_ADDR: "10.0.0.15"
  TIMEZONE: "UTC"
  SVC_MINECRAFT_ADDR: "10.0.0.16"
  SVC_MC_ROUTER_ADDR: "10.0.0.17"
  SVC_PALWORLD_ADDR: "10.0.0.18"
  SVC_IMGUR_PROXY_ADDR: "10.0.0.19"
  SVC_SYSLOG_ADDR: "10.0.0.20"
  # Guaranteed-dead top of the CGNAT range: this placeholder Secret is applied
  # in-cluster before the ExternalSecret overwrites it, so a routable value
  # here could be scraped silently. A dead one fails loudly instead.
  SEEDBOX_TAILNET_ADDR: "100.127.255.254"
  # Public datacenter IP of the seedbox, probed by blackbox for true box-liveness
  # (independent of the tailnet scrape path). Same fail-loud rationale: TEST-NET-1
  # (RFC 5737) is unroutable, so if the ExternalSecret ever fails to overwrite it
  # the probe hits a dead address rather than silently succeeding on a real host.
  SEEDBOX_PUBLIC_IP: "192.0.2.1"
  # The estate's NUT server, now an appliance OUTSIDE the cluster (it has to
  # outlive the cluster it shuts down, so it cannot run on it). Consumed by
  # nut-exporter's ServiceMonitor. (peanut used this too until #3775 moved the
  # dashboard onto the appliance itself.) TEST-NET-1 again:
  # unroutable, so a failed ExternalSecret fails the scrape loudly instead of
  # silently pointing UPS monitoring at some other host.
  NUT_SERVER_ADDR: "192.0.2.2"
