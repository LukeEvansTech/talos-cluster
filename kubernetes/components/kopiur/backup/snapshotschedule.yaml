---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: ${APP}
spec:
  policyRef:
    name: ${APP}
  schedule:
    # Jenkins-style H pins a deterministic per-schedule minute. Timezone now
    # comes from the ClusterRepository scheduleDefaults (Europe/London).
    cron: "H 4 * * *"
    jitter: 2m
    # Trial: take a first snapshot immediately on creation so the repository
    # and identity wiring are validated without waiting a day.
    runOnCreate: true
    suspend: false
