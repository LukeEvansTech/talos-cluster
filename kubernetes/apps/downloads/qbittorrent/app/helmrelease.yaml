---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            nameOverride: qbittorrent
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
            env:
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &BT-port 51749
              # Require WebUI auth even on localhost so the metrics sidecar must present
              # real credentials (from the ExternalSecret) instead of riding an
              # unauthenticated localhost bypass.
              QBT_Preferences__WebUI__LocalHostAuth: true
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          metrics:
            dependsOn: app
            image:
              repository: ghcr.io/martabal/qbittorrent-exporter
              tag: v2.0.1@sha256:ddf2bff9b357e50be4ddb699b6489ac5a49e4fac8c7dc5d4ca2abe1e5855f4dd
            env:
              # Authenticate to the qBittorrent WebUI with real credentials from the
              # ExternalSecret (the localhost-auth bypass is disabled on the app container).
              QBITTORRENT_BASE_URL: "http://localhost:80"
              QBITTORRENT_USERNAME: admin
              QBITTORRENT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: QBT_WEBUI_PASSWORD
              # qBittorrent >= 5.2.0 names the WebUI session cookie QBT_SID_<port>
              # (here QBT_SID_80); the exporter must track it or it loops re-auth
              # once the localhost-auth bypass is off.
              QBITTORRENT_COOKIE_NAME: QBT_SID_80
              EXPORTER_PORT: &metricsPort 9710
              # Per-torrent series (qbittorrent_torrent_info / qbittorrent_tracker_info)
              ENABLE_HIGH_CARDINALITY: "true"
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              seccompProfile: { type: RuntimeDefault }
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
          gluetun-webui:
            dependsOn: app
            image:
              repository: docker.io/scuzza/gluetun-webui
              tag: latest
            env:
              GLUETUN_CONTROL_URL: http://localhost:8000
              PORT: &gluetun-webui-port 3000
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *gluetun-webui-port
                  periodSeconds: 60
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *gluetun-webui-port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *gluetun-webui-port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 128Mi
        initContainers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              # BLOCK_MALICIOUS: off # save 300MB of RAM; https://github.com/qdm12/gluetun/issues/2054
              DOT: "on"
              DOT_CACHING: "on"
              DOT_IPV6: off
              # is absolutely needed if the container is expected to be able to resolve or communicate to any cluster services, without it cluster services cannot be resolved consistently or at all in many setups.
              DNS_KEEP_NAMESERVER: "on"
              FIREWALL: true
              FIREWALL_DEBUG: on
              FIREWALL_INPUT_PORTS: 80,3000,9710,9999
              FIREWALL_OUTBOUND_SUBNETS: '"${CLUSTER_PODS_CIDR},${CLUSTER_SVCS_CIDR},${CR_LAN_CIDR},${GH_LAN_CIDR}"'
              HEALTH_SERVER_ADDRESS: ":9999"
              HEALTH_SERVER_DISABLE_LOOP: on
              HEALTH_VPN_DURATION_INITIAL: 60s
              LOG_LEVEL: debug
              # Public IP check provider — gluetun only accepts "ipinfo" or "ip2location" (not "cloudflare").
              # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/others.md
              PUBLICIP_API: ipinfo
              # STORAGE_FILEPATH: "" # prevent memory spike and avoid I/O
              TZ: ${TIMEZONE}
              UPDATER_PERIOD: 12h
              VERSION_INFORMATION: off
              VPN_INTERFACE: wg0
              VPN_IPV6_SERVER: off
              VPN_TYPE: wireguard
            envFrom:
              - secretRef:
                  name: qbittorrent-secret
            probes:
              liveness:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  timeoutSeconds: 10
                  periodSeconds: 30
                  failureThreshold: 5
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
            restartPolicy: Always
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                add:
                  - NET_ADMIN
              allowPrivilegeEscalation: false
            resources:
              limits:
                kernel.org/tun: 1
        pod:
          labels:
            gluetun: "true"

          # dnsdist:
          #   image:
          #     repository: docker.io/powerdns/dnsdist-19
          #     tag: 1.9.7
          #   restartPolicy: Always
    defaultPodOptions:
      terminationGracePeriodSeconds: 300
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: qbittorrent
        # nameOverride: qbittorrent
        ports:
          http:
            port: *port
          metrics:
            port: *metricsPort
      gluetun:
        controller: qbittorrent
        # nameOverride: gluetun
        ports:
          http:
            port: 8888
      gluetun-webui:
        controller: qbittorrent
        ports:
          http:
            port: *gluetun-webui-port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: qbittorrent-app
                port: 80
      gluetun-webui:
        hostnames:
          - "{{ .Release.Name }}-gluetun.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}-gluetun.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: qbittorrent-gluetun-webui
                port: 3000
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      media:
        type: nfs
        server: ${SECRET_STORAGE_SERVER:-localhost}
        path: /mnt/pool/media
        globalMounts:
          - path: /media
            # dnsdist:
            #   type: configMap
            #   name: qbittorrent-dnsdist
            #   advancedMounts:
            #     qbittorrent:
            #       dnsdist:
            #         - path: /etc/dnsdist/dnsdist.conf
            #           subPath: dnsdist.conf
            #           readOnly: true

            # # TODO: Remove once snatches are sufficient
            # tempmedia:
            #   type: nfs
            #   server: ${TRUENAS_IP}
            #   path: /mnt/speed/snatch
            #   globalMounts:
            #     - path: /speed/snatch
