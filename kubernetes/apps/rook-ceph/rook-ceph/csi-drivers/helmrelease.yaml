---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  values:
    # Rook v1.20 split CSI driver deployment out of the operator chart into the
    # ceph-csi-operator-managed ceph-csi-drivers chart. RBD (ceph-block) only;
    # CephFS/NFS/NVMeoF disabled (Talos has no `ceph` kernel module, so CephFS
    # can't be kernel-mounted — llmkube uses RWO ceph-block instead).
    drivers:
      rbd:
        enabled: true
        # MUST match the existing StorageClass provisioner and all in-use PVs.
        # This mirror packages the upstream ceph-csi-operator chart, which
        # defaults the driver name to the unprefixed "rbd.csi.ceph.com"; Rook's
        # convention (and our ceph-block SC) prefixes the operator namespace.
        name: rook-ceph.rbd.csi.ceph.com
        # Deploy the csi-snapshotter sidecar. The chart defaults this to "none",
        # which omits the sidecar entirely -- so the cluster snapshot-controller
        # creates VolumeSnapshotContents that nothing ever calls CreateSnapshot
        # on (stuck ReadyToUse=false). The pre-v1.20 rook-managed CSI shipped the
        # snapshotter by default; VolSync's copyMethod: Snapshot movers depend on
        # it for every *-nfs/-r2 ReplicationSource.
        snapshotPolicy: volumeSnapshot
      cephfs:
        enabled: false
      nfs:
        enabled: false
      nvmeof:
        enabled: false
    operatorConfig:
      namespace: rook-ceph
