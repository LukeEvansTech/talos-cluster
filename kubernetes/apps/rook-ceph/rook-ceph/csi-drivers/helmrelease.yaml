---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  values:
    # Rook v1.20 split CSI driver deployment out of the operator chart into the
    # ceph-csi-operator-managed ceph-csi-drivers chart. We use RBD only
    # (ceph-block); CephFS/NFS/NVMeoF stay disabled.
    drivers:
      rbd:
        enabled: true
        # MUST match the existing StorageClass provisioner and all in-use PVs.
        # This mirror packages the upstream ceph-csi-operator chart, which
        # defaults the driver name to the unprefixed "rbd.csi.ceph.com"; Rook's
        # convention (and our ceph-block SC) prefixes the operator namespace.
        name: rook-ceph.rbd.csi.ceph.com
      cephfs:
        enabled: false
      nfs:
        enabled: false
      nvmeof:
        enabled: false
    operatorConfig:
      namespace: rook-ceph
