---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  values:
    # Rook v1.20 removed CSI driver deployment from the operator chart; driver
    # config (CephFS toggle, plugin tolerations, RBD sidecar resources, liveness)
    # now lives in the ceph-csi-drivers HelmRelease (../csi-drivers). The operator
    # only installs the ceph-csi-operator and still owns the CSI ServiceMonitor.
    csi:
      serviceMonitor:
        enabled: true
    # Don't let the operator prune crush rules it doesn't recognise.
    deleteUnusedCrushRules: false
    image:
      repository: ghcr.io/rook/ceph
    monitoring:
      enabled: true
    resources:
      requests:
        memory: 512Mi
        cpu: 100m
      limits:
        memory: 2Gi
