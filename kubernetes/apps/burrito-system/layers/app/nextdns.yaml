---
# NextDNS profile-as-code stack — OpenTofu, R2 s3 backend. profile_ids are committed in
# inventory.auto.tfvars (non-secret); only the API key + R2 backend creds are injected.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextdns-creds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: nextdns-creds
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: "{{ .R2_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .R2_SECRET_ACCESS_KEY }}"
        AWS_REGION: auto
        AWS_ENDPOINT_URL_S3: "{{ .R2_S3_ENDPOINT }}"
        TF_VAR_nextdns_api_key: "{{ .NEXTDNS_API_KEY }}"
  dataFrom:
    - extract:
        key: cloudflare-r2-tfstate
    - extract:
        key: nextdns-terraform
---
apiVersion: config.terraform.padok.cloud/v1alpha1
kind: TerraformRepository
metadata:
  name: terraform-nextdns
spec:
  repository:
    url: https://github.com/codelooks-com/terraform-nextdns
  terraform:
    enabled: false
  opentofu:
    enabled: true
    version: "1.12.2"
  remediationStrategy:
    autoApply: false
  overrideRunnerSpec:
    serviceAccountName: runner
    envFrom:
      - secretRef:
          name: nextdns-creds
---
apiVersion: config.terraform.padok.cloud/v1alpha1
kind: TerraformLayer
metadata:
  name: nextdns
spec:
  branch: main
  path: "."
  repository:
    name: terraform-nextdns
    namespace: terraform
