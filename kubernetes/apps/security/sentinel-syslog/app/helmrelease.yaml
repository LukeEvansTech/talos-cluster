---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sentinel-syslog
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: sentinel-syslog
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      sentinel-syslog:
        annotations:
          reloader.stakater.com/auto: "true"
        # Run as the SA whose token the Entra federated credential trusts
        # (subject = system:serviceaccount:security:sentinel-syslog).
        serviceAccount:
          identifier: sentinel-syslog
        containers:
          app:
            image:
              # Custom image: Logstash + microsoft-sentinel output plugin (LukeEvansTech/containers).
              repository: ghcr.io/lukeevanstech/logstash-sentinel
              tag: 9.1.10@sha256:4dcfa5d460cc69248878c16c9e6f727f7ae699cd8421b1788a7871ed9718953a
            env:
              TZ: ${TIMEZONE}
              # Bound the JVM heap AND Netty/direct off-heap for the semi-hyperconverged
              # nodes. Without -XX:MaxDirectMemorySize the syslog input's Netty buffers
              # creep uncapped past the 1536Mi container limit (OOMKilled ~every 4h).
              LS_JAVA_OPTS: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
              # Cap glibc malloc arenas. On a 24-core node glibc defaults to up to
              # 8*ncpu per-thread arenas (~64MB each) for native allocs (JRuby, the
              # Azure SDK's token churn, Netty native) and never returns them to the OS
              # — smaps showed 6x ~64MB arenas creeping ~138Mi/h past the 1536Mi limit,
              # which Xmx/MaxDirectMemorySize don't bound. Pin to 2.
              MALLOC_ARENA_MAX: "2"
              # Workload identity (federated, NO secret). The plugin's managed_identity mode
              # auto-detects these. Identifiers are sourced from cluster-secrets (1Password) because
              # this repo is public — populate after terraform-entra + -azure-platform apply.
              AZURE_CLIENT_ID: "${SECRET_SENTINEL_SYSLOG_CLIENT_ID}"
              AZURE_TENANT_ID: "${SECRET_AZURE_TENANT_ID}"
              AZURE_AUTHORITY_HOST: "https://login.microsoftonline.com/"
              AZURE_FEDERATED_TOKEN_FILE: "/var/run/secrets/azure/tokens/azure-identity-token"
              # Non-secret DCE/DCR coordinates (also via cluster-secrets for public-repo hygiene).
              DCE_URI: "${SECRET_SYSLOG_DCE_URI}"
              DCR_IMMUTABLE_ID: "${SECRET_SYSLOG_DCR_ID}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &monitor 9600
                  initialDelaySeconds: 90
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *monitor
                  initialDelaySeconds: 90
                  periodSeconds: 30
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              # TODO(hardening): set true once data/logs/tmp are all emptyDir-mounted.
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 1536Mi

    serviceAccount:
      sentinel-syslog: {}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: sentinel-syslog
        type: LoadBalancer
        annotations:
          # The shared LAN syslog endpoint — any source ships here. The real address is in
          # cluster-secrets (SVC_SYSLOG_ADDR, 1Password), with a CI placeholder in
          # components/global-vars/cluster-secrets.yaml — kept out of this PUBLIC repo per the
          # internal-identifier scan, same pattern as the other SVC_*_ADDR LB services.
          lbipam.cilium.io/ips: ${SVC_SYSLOG_ADDR}
        externalTrafficPolicy: Local
        ports:
          syslog-udp:
            port: 514
            protocol: UDP
          syslog-tcp:
            port: 514
            protocol: TCP
          monitor:
            port: *monitor

    configMaps:
      pipeline:
        data:
          logstash.conf: |-
            input {
              # Logstash syslog input listens on TCP+UDP 514. Senders should use RFC3164.
              # This is the generic ingestion point — any syslog source can target it.
              syslog {
                port => 514
                # Emit CLASSIC flat fields (program, logsource, facility_label, severity_label,
                # host, timestamp) that the DCR's Custom-SyslogStream + transformKql expect and
                # that the per-source filters below key on. Logstash 8/9 default this input to
                # ECS v8, which nests them ([log][syslog][appname] ...) and leaves [program]
                # empty — so the filters never matched and Computer/Facility/ProcessName/Severity
                # landed blank in the Syslog table. Verified against real OPNsense data 2026-06-23.
                ecs_compatibility => "disabled"
              }
            }

            filter {
              # OPNsense (cr-fw) keeps its clock in UTC and sends RFC3164 timestamps with no zone.
              # The syslog input otherwise reads them in the container's local zone (Europe/London
              # => BST in summer), shifting TimeGenerated ~1h behind ingestion. Re-parse as UTC so
              # TimeGenerated (= the plugin's ls_timestamp = @timestamp) is correct.
              date {
                match    => ["timestamp", "MMM dd HH:mm:ss", "MMM  d HH:mm:ss"]
                timezone => "UTC"
              }

              # ---- FILTER HARD (cost control; deliberate per design) ----
              # Per-source rules below. Sources with no rule pass through to the Syslog table as-is.

              # --- Source: OPNsense firewall (filterlog) ---
              # Keep block/reject; drop routine "pass" (allow) noise. First 7 CSV fields are stable
              # across IP versions: rule,subrule,anchor,tracker,iface,reason,action
              if [program] == "filterlog" {
                dissect {
                  mapping => {
                    "message" => "%{?rule},%{?subrule},%{?anchor},%{?tracker},%{?iface},%{?reason},%{fw_action},%{}"
                  }
                }
                if [fw_action] == "pass" {
                  drop {}
                }
                mutate { remove_field => ["fw_action"] }
              }

              # --- Source: OPNsense Unbound DNS resolver ---
              # Very high volume — sample to ~10% to protect the budget. Promote to keep-all later
              # if DNS threat-hunting needs full fidelity.
              if [program] == "unbound" {
                drop { percentage => 90 }
              }

              # --- Source: OPNsense Suricata/IDS ---
              # Kept whole (security-relevant, low volume) — no rule needed.

              # --- Future sources (Mikrotik, switches, Linux hosts) ---
              # Add per-source filter blocks here; otherwise they ingest verbatim.
            }

            output {
              # Federated workload identity — no secret. The plugin auto-detects the AKS-style
              # AZURE_* env + projected token (AZURE_FEDERATED_TOKEN_FILE) and does the OIDC exchange.
              microsoft-sentinel-log-analytics-logstash-output-plugin {
                # plugin v2.1.0 option names: dcr_id / stream_name (NOT dcr_immutable_id /
                # dcr_stream_name). No managed_identity/client_app_* option — with none set, the
                # plugin uses Azure DefaultAzureCredential, which auto-detects the federated
                # workload identity from the AZURE_* env + projected token (no secret).
                # $$ escapes Flux postBuild substitution so these reach Logstash as $${DCE_URI} /
                # $${DCR_IMMUTABLE_ID}, which Logstash resolves from the container env (cluster-secrets).
                data_collection_endpoint => "$${DCE_URI}"
                dcr_id                   => "$${DCR_IMMUTABLE_ID}"
                stream_name              => "Custom-SyslogStream"
                create_sample_file       => false
              }
            }
      settings:
        data:
          logstash.yml: |-
            # Logstash 9.x: the monitoring API bind settings moved under api.* —
            # plain `http.host` was removed and makes Logstash exit on startup.
            api.http.host: 0.0.0.0
            log.level: info
            # The node has 24 cores and the container sets no CPU limit, so Logstash
            # defaults pipeline.workers to 24 → 24 worker threads + Netty arenas sized
            # for 24 cores, pushing RSS past the 1536Mi limit (OOMKilled ~every 4h).
            # A syslog→Sentinel shipper needs far less; pin it small (raise to 4 if UDP
            # syslog ever shows drop-off under burst).
            pipeline.workers: 2

    persistence:
      # Projected SA token Azure federates against (no webhook — projected manually).
      # audience api://AzureADTokenExchange is what Entra expects for the client assertion.
      azure-token:
        type: custom
        volumeSpec:
          projected:
            defaultMode: 0644
            sources:
              - serviceAccountToken:
                  path: azure-identity-token
                  expirationSeconds: 3600
                  audience: api://AzureADTokenExchange
        globalMounts:
          - path: /var/run/secrets/azure/tokens
            readOnly: true
      pipeline-file:
        type: configMap
        identifier: pipeline
        globalMounts:
          - path: /usr/share/logstash/pipeline/logstash.conf
            subPath: logstash.conf
      settings-file:
        type: configMap
        identifier: settings
        globalMounts:
          - path: /usr/share/logstash/config/logstash.yml
            subPath: logstash.yml
      data:
        type: emptyDir
        globalMounts:
          - path: /usr/share/logstash/data
