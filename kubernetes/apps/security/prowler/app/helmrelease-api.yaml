---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prowler-api
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      prowler-api:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: prowler
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec"
            envFrom: &envFrom
              - secretRef:
                  name: prowler-secret
        containers:
          api:
            image: &image
              repository: prowlercloud/prowler-api
              tag: 5.34.0@sha256:6e2b2e7293636f48899a524db93d6e37824f0658292de60739be84669caea30e
            env: &commonEnv
              TZ: ${TIMEZONE}
              DJANGO_SETTINGS_MODULE: config.django.production
              DJANGO_BIND_ADDRESS: 0.0.0.0
              DJANGO_PORT: "8080"
              DJANGO_ALLOWED_HOSTS: "prowler-api,prowler.${SECRET_DOMAIN},prowler.${SECRET_INTERNAL_DOMAIN}"
              DJANGO_LOGGING_FORMATTER: ndjson
              DJANGO_LOGGING_LEVEL: INFO
              DJANGO_MANAGE_DB_PARTITIONS: "True"
              # Cap gunicorn workers — defaults to (CPU*2+1) which on a
              # 24-core node was 49 workers * ~80MB each = 4GB just for api.
              DJANGO_WORKERS: "4"
              # Same story for Celery's prefork pool — defaults to
              # os.cpu_count() (24 here), and 24 Django children idle at ~4GB.
              DJANGO_CELERY_WORKER_CONCURRENCY: "4"
            envFrom: *envFrom
            probes:
              # Django enforces ALLOWED_HOSTS on every request. The kubelet
              # probes by pod IP, which Django rejects with HTTP 400. Override
              # the Host header so the probe passes ALLOWED_HOSTS validation.
              liveness: &apiProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/
                    port: &port 8080
                    httpHeaders:
                      - name: Host
                        value: prowler-api
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *apiProbe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 2Gi
          worker:
            image: *image
            # Invoke celery directly instead of `../docker-entrypoint.sh worker`
            # (which both defaults to `prod` mode without an explicit command
            # AND hardcodes its flags): Celery 5.6's mingle/gossip startup
            # steps kill the worker instantly + silently (exit 1, no
            # traceback) against Dragonfly's pub/sub fanout, and the
            # entrypoint can't pass `--without-mingle --without-gossip`
            # through. Both are multi-worker coordination features; this is a
            # single worker, so dropping them loses nothing. Command otherwise
            # mirrors the entrypoint's start_worker() (queues, -E,
            # --max-tasks-per-child); DJANGO_APP_COMPONENT tags pg
            # application_name as the entrypoint would.
            command:
              - "/bin/sh"
              - "-c"
            args:
              - >-
                DJANGO_APP_COMPONENT=worker exec uv run python -m celery
                -A config.celery worker
                -n "worker@$(hostname)"
                -l "$${DJANGO_LOGGING_LEVEL:-info}"
                -Q celery,scans,scan-reports,deletion,backfill,overview,integrations,compliance,attack-paths-scans
                -E --max-tasks-per-child 1
                --without-mingle --without-gossip
            env: *commonEnv
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 4Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    serviceAccount:
      prowler: {}

    service:
      app:
        controller: prowler-api
        ports:
          http:
            port: *port

    persistence:
      # Shared scan-output volume — written by `worker`, served by `api`.
      output:
        type: emptyDir
        globalMounts:
          - path: /tmp/prowler_api_output
      # Django config dir (the upstream image writes here at startup).
      config:
        type: emptyDir
        advancedMounts:
          prowler-api:
            api:
              - path: /home/prowler/.config/prowler-api
            worker:
              - path: /home/prowler/.config/prowler-api
      tmp:
        type: emptyDir
        advancedMounts:
          prowler-api:
            api:
              - path: /tmp
                subPath: api-tmp
            worker:
              - path: /tmp
                subPath: worker-tmp
