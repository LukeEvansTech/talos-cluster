---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prowler-beat
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      prowler-beat:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        # Celery beat is a singleton; force Recreate so two never run at once.
        strategy: Recreate
        containers:
          app:
            image:
              repository: prowlercloud/prowler-api
              tag: 5.26.1@sha256:6c373234ad95150c761f1ab1b1be56adcaea981f272f55b6490d50fc56245a0f
            args:
              - "beat"
            env:
              TZ: ${TIMEZONE}
              DJANGO_SETTINGS_MODULE: config.django.production
              DJANGO_LOGGING_FORMATTER: ndjson
              DJANGO_LOGGING_LEVEL: INFO
            envFrom:
              - secretRef:
                  name: prowler-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
