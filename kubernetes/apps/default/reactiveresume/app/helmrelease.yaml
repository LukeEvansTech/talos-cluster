---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reactiveresume
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: reactiveresume
  values:
    controllers:
      reactiveresume:
        annotations:
          reloader.stakater.com/auto: "true"
        # RWO data PVC: avoid multi-attach deadlock on rollout.
        strategy: Recreate
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec"
            envFrom:
              - secretRef:
                  name: reactiveresume-secret
        containers:
          app:
            image:
              repository: ghcr.io/amruthpillai/reactive-resume
              tag: v5.2.3@sha256:bfacee69faad04a8b785854d02cb078fb223824e8b07a07ff21fa39ebfa9fe8c
            env:
              TZ: ${TIMEZONE}
              PORT: &port 3000
              SERVER_PORT: "3001"
              APP_URL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              # RR v5 bundles pg-connection-string v2, which forces sslmode=require
              # to verify-full and ignores the URL's ssl params. CNPG's server cert
              # is signed by the in-cluster cert-manager CA that Node doesn't trust,
              # so DB TLS fails with DEPTH_ZERO_SELF_SIGNED_CERT. The CA isn't
              # reachable from this namespace, so skip Node TLS verification. The DB
              # hop stays TLS-encrypted (just unverified) and is in-cluster only;
              # S3 (Garage) and Redis (Dragonfly) are non-TLS.
              NODE_TLS_REJECT_UNAUTHORIZED: "0"
              # Object storage: in-cluster Garage (S3). Keys come from the Secret.
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: reactive-resume
              S3_FORCE_PATH_STYLE: "true"
              # Account registered; signups locked down.
              FLAG_DISABLE_SIGNUPS: "true"
              FLAG_DISABLE_EMAIL_AUTH: "false"
            envFrom:
              - secretRef:
                  name: reactiveresume-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: reactiveresume
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
      # Headless-Chrome PDF rendering needs more than the default 64Mi /dev/shm.
      dshm:
        type: emptyDir
        medium: Memory
        sizeLimit: 256Mi
        globalMounts:
          - path: /dev/shm
