---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: subspy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: subspy
  values:
    controllers:
      subspy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lukeevanstech/subspy
              tag: 1.6.3
              digest: sha256:d39aa1b6b72962eb3c1293400e4d9303bfc06e6fbbf7583a45f6894c1f57e792
            env:
              TZ: ${TIMEZONE}
              DATABASE_URL: sqlite:///./data/subspy.db
              LLM_PROVIDER: openai
              OPENAI_API_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              OPENAI_MODEL: self-hosted
            envFrom:
              - secretRef:
                  name: subspy-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      imagePullSecrets:
        - name: subspy-ghcr-auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: subspy
        annotations:
          # Gatus checks the app's health endpoint (returns 200), not the
          # homepage `/`. Route auto-discovery is disabled below so this is the
          # single source of truth for subspy's status.
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |
            name: subspy
            group: internal
            url: http://subspy.default.svc.cluster.local:8080/api/health
            interval: 1m
            conditions:
              - "[STATUS] == 200"
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          # Auto-discovered check would probe `/`; the explicit service check
          # above owns subspy's status instead.
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "subspy.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
