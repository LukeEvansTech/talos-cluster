---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keeper
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: keeper-secret
    template:
      engineVersion: v2
      data:
        BETTER_AUTH_SECRET: "{{ .BETTER_AUTH_SECRET }}"
        ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"
        DATABASE_URL: "postgres://{{ .KEEPER_POSTGRES_USER }}:{{ .KEEPER_POSTGRES_PASS }}@postgres18-rw.database.svc.cluster.local:5432/{{ .POSTGRES_DB }}?sslmode=no-verify"
        REDIS_URL: "redis://default:{{ .DRAGONFLY_PASSWORD }}@dragonfly.database.svc.cluster.local:6379"
        INIT_POSTGRES_DBNAME: "{{ .POSTGRES_DB }}"
        INIT_POSTGRES_HOST: postgres18-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .KEEPER_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .KEEPER_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: keeper
    - extract:
        key: cloudnative-pg
    - extract:
        key: dragonfly
