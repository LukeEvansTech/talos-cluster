---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keeper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: keeper
  values:
    controllers:
      keeper:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec"
            envFrom:
              - secretRef:
                  name: keeper-secret
        containers:
          app:
            image:
              repository: ghcr.io/ridafkih/keeper-services
              tag: 2.11@sha256:933003f76852597b33b0a9a457846828a7d034998ffb2d83c7ce3a09c0c60392
            env:
              TZ: ${TIMEZONE}
              BETTER_AUTH_URL: "https://keeper.${SECRET_DOMAIN}"
              TRUSTED_ORIGINS: "https://keeper.${SECRET_DOMAIN},https://keeper.${SECRET_INTERNAL_DOMAIN}"
              WORKER_JOB_QUEUE_ENABLED: "true"
              BLOCK_PRIVATE_RESOLUTION: "false"
            envFrom:
              - secretRef:
                  name: keeper-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: keeper
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
