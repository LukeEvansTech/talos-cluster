---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: feather
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: feather
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      feather:
        containers:
          app:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: 1.31-alpine@sha256:cc300bd2e8776708a8c2c8686a74f06eadf221c5ce01e85d0e821955d7a730ab
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /apps.json
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    service:
      app:
        controller: feather
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          # static IPA source; skip Gatus auto-monitoring (mirrors rackula)
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      # Served content, read-only over NFS from the TrueNAS sideload export.
      # Fed by: Mac ~/sideload --Syncthing--> /mnt/pool/syncthing/sideload (NFS share id 25, ro).
      www:
        type: custom
        volumeSpec:
          nfs:
            server: "${SECRET_STORAGE_SERVER}"
            path: /mnt/pool/syncthing/sideload
        globalMounts:
          - path: /usr/share/nginx/html
            readOnly: true
      # writable scratch for nginx with a read-only root filesystem
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/nginx
      run:
        type: emptyDir
        globalMounts:
          - path: /var/run
