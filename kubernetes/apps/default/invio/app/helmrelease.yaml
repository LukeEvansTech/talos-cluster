---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app invio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: invio
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/kittendevv/invio
              repository: ghcr.io/kittendevv/invio
              tag: v2.0.0@sha256:ee5f20a4e74aae0610148e405c14d1be6a98b10de1c8eac97d42ac5c3f3324e3
            # The image's default Cmd lets supervisord default its main logfile
            # to $CWD/supervisord.log = /app/supervisord.log, which user 1000
            # cannot write to. `-l /tmp/supervisord.log` redirects it.
            command:
              - "/usr/bin/supervisord"
            args:
              - "-n"
              - "-c"
              - "/etc/supervisor/conf.d/supervisord.conf"
              - "-l"
              - "/tmp/supervisord.log"
            env:
              TZ: ${TIMEZONE}
              DATABASE_PATH: /app/data/invio.db
              # SvelteKit CSRF: canonical origin for the app. Internal hostname
              # is the primary access path; the SECRET_DOMAIN alias on the same
              # internal listener will CSRF-reject if used for state-changing
              # requests — switch to it here if that becomes the preferred URL.
              ORIGIN: https://invio.${SECRET_INTERNAL_DOMAIN}
              # Envoy terminates TLS upstream; backend pod sees HTTP. Without
              # this, SvelteKit refuses to set login cookies.
              COOKIE_SECURE: "false"
            envFrom:
              - secretRef:
                  name: invio-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: app
        ports:
          http:
            port: 8000

    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: invio-app
                port: 8000

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          app:
            app:
              - path: /app/data
