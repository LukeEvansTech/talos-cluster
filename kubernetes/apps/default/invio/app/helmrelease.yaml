---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app invio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: invio
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/kittendevv/invio
              repository: ghcr.io/kittendevv/invio
              tag: v2.0.2@sha256:faf00642514e27f34135083ecfe17f4f28b87f3dc8850476287f3f12e8e9e8a1
            # The image's default Cmd lets supervisord default its main logfile
            # to $CWD/supervisord.log = /app/supervisord.log, which user 1000
            # cannot write to. `-l /tmp/supervisord.log` redirects it.
            command:
              - "/usr/bin/supervisord"
            args:
              - "-n"
              - "-c"
              - "/etc/supervisor/conf.d/supervisord.conf"
              - "-l"
              - "/tmp/supervisord.log"
            env:
              TZ: ${TIMEZONE}
              DATABASE_PATH: /app/data/invio.db
              # SvelteKit CSRF: canonical origin for the app. Internal hostname
              # is the primary access path; the SECRET_DOMAIN alias on the same
              # internal listener will CSRF-reject if used for state-changing
              # requests — switch to it here if that becomes the preferred URL.
              ORIGIN: https://invio.${SECRET_INTERNAL_DOMAIN}
              # Envoy terminates TLS upstream; backend pod sees HTTP. Without
              # this, SvelteKit refuses to set login cookies.
              COOKIE_SECURE: "false"
            envFrom:
              - secretRef:
                  name: invio-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
        initContainers:
          # The image ships /app/backend root-owned with a stale deno.lock that
          # deno 2.6.8 insists on rewriting at startup. User 1000 can't write the
          # root-owned dir, so `deno task start` fails ("Failed writing lockfile
          # ... Permission denied") and the backend crash-loops into FATAL —
          # which makes the frontend return 500 ("Unable to connect"). Copy
          # /app/backend into a writable emptyDir (cp runs as uid 1000, so the
          # copies become user-owned) and mount it over /app/backend so deno can
          # refresh its lockfile in place.
          init-backend:
            image:
              # renovate: datasource=docker depName=ghcr.io/kittendevv/invio
              repository: ghcr.io/kittendevv/invio
              tag: v2.0.2@sha256:faf00642514e27f34135083ecfe17f4f28b87f3dc8850476287f3f12e8e9e8a1
            command:
              - sh
              - -c
              # cp -r (not -a): cp as uid 1000 can't preserve timestamps on the
              # emptyDir mount root, and we don't want to preserve the source's
              # root ownership anyway — files copied as uid 1000 are what makes
              # deno.lock writable.
              - cp -r /app/backend/. /writable-backend/

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: app
        ports:
          http:
            port: 8000

    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "false"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: invio
                port: 8000

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          app:
            app:
              - path: /app/data
      # Deno's npm cache lives at /.cache/deno; bare image runs as user 1000
      # which can't write to /.cache. emptyDir gives it somewhere writable.
      cache:
        type: emptyDir
        advancedMounts:
          app:
            app:
              - path: /.cache
      # Writable copy of the image's /app/backend (populated by the
      # init-backend initContainer) so deno can rewrite its stale lockfile.
      backend:
        type: emptyDir
        advancedMounts:
          app:
            init-backend:
              - path: /writable-backend
            app:
              - path: /app/backend
