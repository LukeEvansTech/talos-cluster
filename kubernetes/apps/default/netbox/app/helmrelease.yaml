---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: netbox
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    commonAnnotations:
      reloader.stakater.com/auto: "true"
    replicaCount: 1
    timeZone: "${TIMEZONE}"
    loginRequired: true
    superuser:
      name: admin
      email: "admin@${SECRET_DOMAIN}"
      existingSecret: netbox-secret
    existingSecret: netbox-secret
    allowedHosts:
      - "netbox.${SECRET_DOMAIN}"
      - "netbox.${SECRET_INTERNAL_DOMAIN}"
    allowedHostsIncludesPodIP: true
    csrf:
      trustedOrigins:
        - "https://netbox.${SECRET_DOMAIN}"
        - "https://netbox.${SECRET_INTERNAL_DOMAIN}"
    plugins: []
    persistence:
      enabled: true
      existingClaim: netbox
    resourcesPreset: none
    resources:
      requests:
        cpu: 100m
        # Web pod's real steady-state is ~500Mi+ with Granian; 256Mi under-reserved it.
        memory: 512Mi
      limits:
        # NetBox v4 serves HTTP via Granian; each worker loads the full Django app.
        # At 4 workers the pod crept to ~956Mi and got OOMKilled against a 1Gi limit.
        # GRANIAN_WORKERS=2 (below) halves the footprint; 1.5Gi gives headroom.
        memory: 1536Mi
    extraEnvs:
      # Default is 4 (`${GRANIAN_WORKERS:-4}` in launch-netbox.sh) — overkill for this
      # low-concurrency homelab instance and the main driver of the OOM. Drop to 2.
      - name: GRANIAN_WORKERS
        value: "2"
    initContainers:
      - name: init-db
        image: ghcr.io/home-operations/postgres-init:18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom:
          - secretRef:
              name: netbox-secret
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    postgresql:
      enabled: false
    externalDatabase:
      host: postgres18-rw.database.svc.cluster.local
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-secret
      existingSecretKey: db_password
      options:
        sslmode: require
        target_session_attrs: read-write
    valkey:
      enabled: false
    tasksDatabase:
      host: dragonfly.database.svc.cluster.local
      port: 6379
      database: 0
      username: default
      existingSecretName: netbox-secret
      existingSecretKey: tasks_password
    cachingDatabase:
      host: dragonfly.database.svc.cluster.local
      port: 6379
      database: 1
      username: default
      existingSecretName: netbox-secret
      existingSecretKey: cache_password
    worker:
      enabled: true
    housekeeping:
      enabled: true
      # The housekeeping CronJob mounts the RWO `media` PVC (ceph-block), which is
      # attached to whichever node runs the netbox web/worker pods. Without affinity
      # the job can schedule onto a different node and hang forever in
      # ContainerCreating (multi-attach). Pin it to the node holding the volume.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: netbox
                  app.kubernetes.io/component: netbox
              topologyKey: kubernetes.io/hostname
