---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      version: v25.10.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
      interval: 1h
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    cdi:
      enabled: true
      default: true
    devicePlugin:
      enabled: false
    dcgmExporter:
      enabled: false
    gfd:
      enabled: true
    mig:
      strategy: none
    nodeStatusExporter:
      enabled: false
    sandboxWorkloads:
      enabled: false
    gds:
      enabled: false
    kataManager:
      enabled: false
    vgpuManager:
      enabled: false
    vgpuDeviceManager:
      enabled: false
    runtimeClass:
      install: false
      name: nvidia
    operator:
      defaultRuntime: containerd
      runtimeClass: nvidia
    validator:
      driver:
        env:
          - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
            value: "true"
    daemonsets:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: extensions.talos.dev/nvidia-open-gpu-kernel-modules-production
                  operator: Exists
                - key: extensions.talos.dev/nvidia-container-toolkit-production
                  operator: Exists
