---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      version: v25.3.0
      sourceRef:
        kind: HelmRepository
        name: nvidia
      interval: 1h
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    cdi:
      enabled: true
      default: true
    devicePlugin:
      enabled: true
      config:
        name: time-slicing-config
        default: any
    dcgmExporter:
      enabled: true
      serviceMonitor:
        enabled: true
    gfd:
      enabled: true
    mig:
      strategy: none
    nodeStatusExporter:
      enabled: false
    sandboxWorkloads:
      enabled: false
    gds:
      enabled: false
    kataManager:
      enabled: false
    vgpuManager:
      enabled: false
    vgpuDeviceManager:
      enabled: false
    runtimeClass:
      install: false
      name: nvidia
    operator:
      defaultRuntime: containerd
      runtimeClass: nvidia
    validator:
      driver:
        env:
          - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
            value: "true"
