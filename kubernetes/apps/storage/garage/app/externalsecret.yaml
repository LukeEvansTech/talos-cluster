---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: garage-secret
    template:
      engineVersion: v2
      data:
        # Injected into the container as env; Garage reads these and they never
        # touch the ConfigMap (avoids Trivy KSV-0109 "secrets in ConfigMap").
        GARAGE_RPC_SECRET: "{{ .GARAGE_RPC_SECRET }}"
        GARAGE_ADMIN_TOKEN: "{{ .GARAGE_ADMIN_TOKEN }}"
  dataFrom:
    - extract:
        key: garage
