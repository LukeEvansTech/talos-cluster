---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app garage
  namespace: &namespace storage
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/gatus/guarded
    - ../../../../components/homepage
  interval: 1h
  path: ./kubernetes/apps/storage/garage/app
  postBuild:
    substitute:
      APP: *app
      HOMEPAGE_NAME: Garage
      HOMEPAGE_GROUP: Storage
      HOMEPAGE_ICON: garage.svg
      HOMEPAGE_DESCRIPTION: S3 object storage
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
