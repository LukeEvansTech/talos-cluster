---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cross-namespace-ingress
spec:
  description: "Allow ingress from gateway (network namespace)"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-litellm-from-consumers
spec:
  # LiteLLM's OpenAI consumers that live outside the `ai` namespace
  # (contracthound + subspy in `default`, loupe in `custom`) need pod-to-pod
  # ingress to LiteLLM once they move off Ollama. Additive to the namespace-wide
  # policy above (Cilium unions allows), scoped to the litellm endpoint only.
  description: "Allow LiteLLM consumers in default/custom to reach litellm"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: litellm
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: io.kubernetes.pod.namespace
              operator: In
              values:
                - default
                - custom
