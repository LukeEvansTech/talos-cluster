---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: llmkube
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Model weights now come from per-model RWO ceph-block PVCs (pvc:// sources),
    # staged by one-off hf-download Jobs. Talos has no ceph kernel module and
    # cannot mount CephFS, so the shared modelCache is disabled.
    modelCache:
      enabled: false
    prometheus:
      inferencePodMonitor:
        # Deliberately off: the hand-rolled llmkube-models ServiceMonitor (with
        # targetLabels for per-backend dashboard filtering) is the single scrape
        # path for the llama.cpp backends. Enabling this too would scrape every
        # pod twice under a second job label and double llamacpp:* series.
        enabled: false
