---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 1h
  chart:
    spec:
      chart: llmkube
      version: 0.8.10
      sourceRef:
        kind: HelmRepository
        name: llmkube
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # No https model sources are served yet, so the shared download cache stays
    # off. Enable it (and provide an RWX cache PVC) before adding a Model with an
    # https:// source — see docs/docs/architecture/ai-llm-stack.md "Layer 4".
    modelCache:
      enabled: false
    prometheus:
      inferencePodMonitor:
        enabled: false
