---
# Model: operator-managed HF repo source. The operator stages the GGUF and the
# mmproj projector into the shared llmkube-model-cache PVC (CephFS RWX) and
# passes the projector to the runtime itself — no staging Job, no hand-rolled
# --mmproj path.
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.6-35b-a3b
spec:
  source: hf://unsloth/Qwen3.6-35B-A3B-GGUF
  files:
    - Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
  mmproj: mmproj-F16.gguf
  format: gguf
  quantization: UD-IQ4_XS
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-nvidia
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.6-35b-a3b
  # The llmkube controller stages the GGUF (+ mmproj) into the shared
  # llmkube-model-cache PVC itself and the runtime mounts it read-only, so the
  # per-pod model-downloader init container is redundant (it just logs "already
  # cached"). Drop it — this is the operator's own MissingSkipModelInit advice.
  skipModelInit: true
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:f96be8dfd1c1eb533e09f42fc4d92311150dc63ecd568284c9199cacae5a9e26
  replicas: 1
  runtimeClassName: nvidia
  priorityClassName: gpu-preemptible
  contextSize: 32768
  parallelSlots: 3
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the final answer or tool call."
  batchSize: 4096
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: "500m"
    memory: 20Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  podLabels:
    llm-gpu-model: "true"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              llm-gpu-model: "true"
  # No runAsNonRoot: the operator's model-cache-prep init container must run as
  # scoped root (drop ALL, add CHOWN+FOWNER only, no privesc, ro rootfs) to
  # chown the shared cache on fsGroupPolicy:None backends like CephFS — the
  # upstream-supported compatibility path (docs/MODEL-CACHE.md). Runtime
  # containers still run as 1000 via runAsUser below.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  endpoint:
    port: 8080
    type: ClusterIP
  # NB: no manual --mmproj here — the operator injects the projector argument
  # from Model.spec.mmproj with the correct cache path.
  extraArgs:
    - --alias
    - self-hosted
    - --no-mmap
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --cont-batching
    - --cache-prompt
  probeOverrides:
    startup:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
