---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-nvidia-models
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 40Gi # ~18Gi GGUF + ~1.4Gi mmproj + headroom
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-qwen3-6-35b-a3b
  annotations:
    # CKV_K8S_21: namespace is applied by the Flux Kustomization targetNamespace,
    # not the raw manifest. CKV_K8S_40: UID 1000 is the cluster convention and a
    # host-UID collision is not a concern on single-tenant Talos nodes.
    checkov.io/skip1: CKV_K8S_21=Namespace injected by Flux targetNamespace
    checkov.io/skip2: CKV_K8S_40=UID 1000 is the cluster convention on single-tenant Talos
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      # Non-root, drop-ALL, read-only rootfs (cluster security defaults). curl
      # streams the public GGUFs straight to the RWO PVC; fsGroup makes the
      # ceph-block volume group-writable. Idempotent ([ -s ] guard) so a re-run
      # after a fresh PVC re-downloads only what's missing.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fetch
          image: docker.io/curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          command:
            - /bin/sh
            - -ec
          args:
            - |
              cd /models
              base=https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main
              for f in Qwen3.6-35B-A3B-UD-IQ4_XS.gguf mmproj-F16.gguf; do
                [ -s "$f" ] || curl -fSL --retry 5 --retry-delay 10 -o "$f" "$base/$f"
              done
          resources:
            requests:
              cpu: "500m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-nvidia-models
---
# Model: pvc:// source (no download by the operator; staged by the Job above).
# NOTE: the operator mounts the PVC claim at /model-source/ — verify this path
# on first deploy if --mmproj fails to resolve.
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.6-35b-a3b
spec:
  source: pvc://llama-nvidia-models/Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
  format: gguf
  quantization: UD-IQ4_XS
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-nvidia
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3.6-35b-a3b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:ce294a4561e6ed7223cde8909daa03fb4653fc5e938a5981e1fde8004ff0f2a9
  replicas: 1
  runtimeClassName: nvidia
  priorityClassName: gpu-preemptible
  contextSize: 32768
  parallelSlots: 3
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the final answer or tool call."
  batchSize: 4096
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: "500m"
    memory: 20Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  podLabels:
    llm-gpu-model: "true"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              llm-gpu-model: "true"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted
    - --mmproj
    - /model-source/mmproj-F16.gguf
    - --no-mmap
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --cont-batching
    - --cache-prompt
  probeOverrides:
    startup:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
