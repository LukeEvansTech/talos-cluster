---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llmkube-models
spec:
  selector:
    matchExpressions:
      - key: inference.llmkube.dev/service
        operator: Exists
  namespaceSelector:
    matchNames:
      - ai
  # Copy the operator's per-InferenceService labels onto every series so the
  # llama-server dashboard can filter per backend (app.kubernetes.io/instance is
  # the InferenceService, e.g. llama-nvidia / llama-uncensored).
  targetLabels:
    - app.kubernetes.io/instance
    - app.kubernetes.io/name
  endpoints:
    - port: http
      path: /metrics
  fallbackScrapeProtocol: PrometheusText0.0.4
