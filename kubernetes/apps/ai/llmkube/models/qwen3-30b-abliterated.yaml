---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-uncensored-models
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 30Gi # ~17Gi GGUF + headroom
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-qwen3-30b-abliterated
  annotations:
    # One-shot staging Job (downloads the GGUF to the RWO PVC once). Flux must not
    # re-apply it: a Job's spec.template is immutable, so Renovate bumping the curl
    # image would fail the Kustomization. Created once, then left alone.
    kustomize.toolkit.fluxcd.io/reconcile: disabled
    # CKV_K8S_21: namespace is applied by the Flux Kustomization targetNamespace,
    # not the raw manifest. CKV_K8S_40: UID 1000 is the cluster convention and a
    # host-UID collision is not a concern on single-tenant Talos nodes.
    checkov.io/skip1: CKV_K8S_21=Namespace injected by Flux targetNamespace
    checkov.io/skip2: CKV_K8S_40=UID 1000 is the cluster convention on single-tenant Talos
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      # Non-root, drop-ALL, read-only rootfs (cluster security defaults).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fetch
          image: docker.io/curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          command:
            - /bin/sh
            - -ec
          args:
            - |
              cd /models
              f=Qwen3-30B-A3B-abliterated.i1-Q4_K_S.gguf
              base=https://huggingface.co/mradermacher/Qwen3-30B-A3B-abliterated-i1-GGUF/resolve/main
              [ -s "$f" ] || curl -fSL --retry 5 --retry-delay 10 -o "$f" "$base/$f"
          resources:
            requests:
              cpu: "500m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-uncensored-models
---
# Model: pvc:// source (no download by the operator; staged by the Job above).
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-30b-a3b-abliterated
spec:
  source: pvc://llama-uncensored-models/Qwen3-30B-A3B-abliterated.i1-Q4_K_S.gguf
  format: gguf
  quantization: i1-Q4_K_S
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-uncensored
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-30b-a3b-abliterated
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:54421a9c76f8ab7c7a8aa8f8c13fec764e30a574edc4b6b11213bd1fb0ccfb65
  replicas: 1
  runtimeClassName: nvidia
  priorityClassName: gpu-preemptible
  # opencode's agent baseline is ~41k tokens (system prompt + tool schemas),
  # larger than Qwen3-30B-A3B's 32k native context. Serve it at 64k via YaRN
  # (factor 2.0) so the agent fits with working headroom. Single slot: 64k of
  # KV (q8_0 K/V ~3.3Gi) fits the L4's ~5.5Gi free after the ~17Gi Q4_K_S
  # weights; 2 slots would halve the window back to 32k. Static YaRN softens
  # short-prompt quality slightly, so factor 2 is the smallest that covers opencode.
  contextSize: 65536
  parallelSlots: 1
  ropeScaling:
    type: yarn
    factor: "2.0"
    originalContext: 32768
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the final answer or tool call."
  batchSize: 4096
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: "500m"
    memory: 20Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  podLabels:
    llm-gpu-model: "true"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              llm-gpu-model: "true"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted-uncensored
    - --no-mmap
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --cont-batching
    - --cache-prompt
  probeOverrides:
    startup:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
