---
# Model: operator-managed HF repo source. The operator stages the GGUF into the
# shared llmkube-model-cache PVC (CephFS RWX) itself — the curl staging Job this
# file used to carry is gone with it.
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-30b-a3b-abliterated
spec:
  source: hf://mradermacher/Qwen3-30B-A3B-abliterated-i1-GGUF
  files:
    - Qwen3-30B-A3B-abliterated.i1-Q4_K_S.gguf
  format: gguf
  quantization: i1-Q4_K_S
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-uncensored
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-30b-a3b-abliterated
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:72ca3a0323ec891af9332afc8d501396557a45eca2b1b3712828d5cf57e36743
  replicas: 1
  runtimeClassName: nvidia
  priorityClassName: gpu-preemptible
  # opencode's agent baseline is ~41k tokens (system prompt + tool schemas),
  # just over this GGUF's 40960 native train context. Serve it at 64k via YaRN
  # so the agent fits with working headroom. NOTE: the pinned llama.cpp server
  # hard-caps a slot to n_ctx_train (40960) even with correct YaRN args, so the
  # --override-kv in extraArgs below raises the reported context_length to 65536
  # to defeat that cap; the rope interpolation still comes from ropeScaling.
  # Single slot: 64k of KV (q8_0 K/V ~3.3Gi) fits the L4's ~5.5Gi free after the
  # ~17Gi Q4_K_S weights; 2 slots would halve the window. Static YaRN softens
  # short prompts slightly, so factor 2 is the smallest that covers opencode.
  contextSize: 65536
  parallelSlots: 1
  ropeScaling:
    type: yarn
    factor: "2.0"
    originalContext: 32768
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the final answer or tool call."
  batchSize: 4096
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: "500m"
    memory: 20Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  podLabels:
    llm-gpu-model: "true"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              llm-gpu-model: "true"
  # No runAsNonRoot: the operator's model-cache-prep init container must run as
  # scoped root (drop ALL, add CHOWN+FOWNER only, no privesc, ro rootfs) to
  # chown the shared cache on fsGroupPolicy:None backends like CephFS — the
  # upstream-supported compatibility path (docs/MODEL-CACHE.md). Runtime
  # containers still run as 1000 via runAsUser below.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted-uncensored
    # Defeat the llama.cpp server's hard cap of n_ctx to the model's trained
    # length (40960): raise the reported context_length so the YaRN-extended 64k
    # window is actually served. Arch key is qwen3moe (Qwen3-30B-A3B is MoE).
    - --override-kv
    - qwen3moe.context_length=int:65536
    - --no-mmap
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --cont-batching
    - --cache-prompt
  probeOverrides:
    startup:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
