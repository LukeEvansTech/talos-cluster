---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-uncensored-models
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 30Gi # ~17Gi GGUF + headroom
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-qwen3-30b-abliterated
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: hf
          image: python:3.14-slim
          command:
            - /bin/sh
            - -ec
          args:
            - |
              pip install --no-cache-dir "huggingface_hub[hf_transfer]"
              hf download mradermacher/Qwen3-30B-A3B-abliterated-i1-GGUF \
                Qwen3-30B-A3B-abliterated.i1-Q4_K_S.gguf \
                --local-dir /models
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-uncensored-models
---
# Model: pvc:// source (no download by the operator; staged by the Job above).
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-30b-a3b-abliterated
spec:
  source: pvc://llama-uncensored-models/Qwen3-30B-A3B-abliterated.i1-Q4_K_S.gguf
  format: gguf
  quantization: i1-Q4_K_S
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-uncensored
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-30b-a3b-abliterated
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:ce294a4561e6ed7223cde8909daa03fb4653fc5e938a5981e1fde8004ff0f2a9
  replicas: 1
  runtimeClassName: nvidia
  priorityClassName: gpu-preemptible
  contextSize: 8192
  parallelSlots: 2
  flashAttention: true
  jinja: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the final answer or tool call."
  batchSize: 4096
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: "500m"
    memory: 20Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  podLabels:
    llm-gpu-model: "true"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              llm-gpu-model: "true"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --alias
    - self-hosted-uncensored
    - --no-mmap
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0"
    - --cont-batching
    - --cache-prompt
  probeOverrides:
    startup:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
