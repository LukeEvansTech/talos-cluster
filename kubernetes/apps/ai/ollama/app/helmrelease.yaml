---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ollama
  values:
    controllers:
      ollama:
        # StatefulSet so each replica gets its own RWO model/config PVC
        # (no RWX storage class available) and a stable per-node identity.
        type: statefulset
        replicas: 3
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: models
              size: 100Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block
              globalMounts:
                - path: /models
            - name: config
              size: 1Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block
              globalMounts:
                - path: /root/.ollama
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.6@sha256:fbaaecc6c632a73c2b4ca25ef52dbee0b68d07783fcb850f916404c004040f90
            env:
              - name: OLLAMA_HOST
                value: 0.0.0.0
              - name: OLLAMA_ORIGINS
                value: "*"
              - name: OLLAMA_MODELS
                value: "/models"
              - name: OLLAMA_KEEP_ALIVE
                value: "24h"
              # Batch concurrent requests per replica. KV-cache is the limiter:
              # ~24Gi VRAM - ~18Gi model leaves ~6Gi, shared (time-sliced GPU)
              # with the whisper workloads. Start at 2; watch nvidia-smi before
              # raising. Cap context length below if KV-cache OOMs.
              - name: OLLAMA_NUM_PARALLEL
                value: "2"
            resources:
              requests:
                nvidia.com/gpu: 1 # one time-slice on the node's physical GPU
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 24Gi
                nvidia.com/gpu: 1
    defaultPodOptions:
      labels:
        gpu-workload: "true"
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      topologySpreadConstraints:
        # One replica per node so each lands on a distinct physical GPU.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              gpu-workload: "true"
    service:
      app:
        controller: ollama
        ports:
          http:
            port: 11434
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
