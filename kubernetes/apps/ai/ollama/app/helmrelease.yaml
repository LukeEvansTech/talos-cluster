---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ollama
  values:
    controllers:
      ollama:
        # StatefulSet so each replica gets its own RWO model/config PVC
        # (no RWX storage class available) and a stable per-node identity.
        type: statefulset
        # Transitional during the llama.cpp migration: 1 replica frees 2 of the 3
        # L4s for the llama.cpp InferenceServices. Ollama is removed entirely by the
        # decommission PR once contracthound/subspy/loupe are on their OpenAI images.
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: models
              size: 100Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block
              globalMounts:
                - path: /models
            - name: config
              size: 1Gi
              accessMode: ReadWriteOnce
              storageClass: ceph-block
              globalMounts:
                - path: /root/.ollama
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.10@sha256:bfc9c6d53cc6989aa5131a6fde6b162b2802d4d337657f3253b5f69579bddeee
            env:
              - name: OLLAMA_HOST
                value: 0.0.0.0
              - name: OLLAMA_ORIGINS
                value: "*"
              - name: OLLAMA_MODELS
                value: "/models"
              - name: OLLAMA_KEEP_ALIVE
                value: "24h"
              # Batch concurrent requests per replica. GPUs are now dedicated to
              # ollama (the whisper transcription stack was archived), so a ~17Gi
              # model on a 24Gi card leaves ~5-6Gi for KV-cache → 3 slots is safe
              # at typical (short) listing contexts. Watch nvidia-smi if contexts
              # grow large; cap OLLAMA_CONTEXT_LENGTH before lowering this.
              - name: OLLAMA_NUM_PARALLEL
                value: "3"
            resources:
              requests:
                nvidia.com/gpu: 1 # one time-slice on the node's physical GPU
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 24Gi
                nvidia.com/gpu: 1
          # GPU-less reconciler: the ollama image as a CLI client against the
          # server container in this same pod. Keeps the declared model set
          # (resources/*.Modelfile + models.list) present on this replica's
          # /models PVC. Runs on every replica → identical set by construction.
          # The loop never exits (a crash would flip the pod NotReady and pull
          # the server out of the Service); see resources/reconcile.sh.
          provisioner:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.10@sha256:bfc9c6d53cc6989aa5131a6fde6b162b2802d4d337657f3253b5f69579bddeee
            command:
              - "/bin/sh"
              - "/config/reconcile.sh"
            env:
              - name: OLLAMA_HOST
                value: "127.0.0.1:11434"
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      labels:
        gpu-workload: "true"
        # Shared GPU-exclusivity label: the llama.cpp InferenceServices' podAntiAffinity
        # matches llm-gpu-model, so the single Ollama replica and the two models land
        # on three distinct physical L4s (time-slicing shares VRAM, not isolates it).
        llm-gpu-model: "true"
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      topologySpreadConstraints:
        # One replica per node so each lands on a distinct physical GPU.
        # Select ollama pods only — `gpu-workload` is shared by other GPU apps
        # (plex, jellyfin, …) and would skew the spread across all of them
        # instead of distributing the 3 ollama replicas.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ollama
    service:
      app:
        controller: ollama
        ports:
          http:
            port: 11434
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      # Model set + reconcile script (generated from app/resources/ by
      # configMapGenerator). Mounted into the provisioner container only.
      model-defs:
        type: configMap
        name: ollama-models
        advancedMounts:
          ollama:
            provisioner:
              - path: /config
                readOnly: true
