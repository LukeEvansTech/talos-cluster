---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-crds
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive-crds
  interval: 1h
  path: ./kubernetes/apps/ai/toolhive/crds
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive
  dependsOn:
    - name: toolhive-crds
      namespace: *namespace
  interval: 1h
  path: ./kubernetes/apps/ai/toolhive/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-mcp-servers
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive-mcp-servers
  dependsOn:
    - name: toolhive
      namespace: *namespace
    - name: onepassword-connect
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/ai/toolhive/mcp-servers
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
