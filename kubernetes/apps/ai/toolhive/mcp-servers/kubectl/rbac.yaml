---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubectl-mcp-readonly
  namespace: ai
---
# Broad read-only access for the kubectl + flux MCP servers. Kubernetes Secrets
# (core v1) are deliberately excluded so the LLM can inspect cluster state but
# never read secret values.
#
# - aggregationRule: same selector as the built-in "view" ClusterRole — expands
#   automatically as operators ship rbac.authorization.k8s.io/aggregate-to-view
#   ClusterRoles (CRDs, etc.).
# - Core group "": explicit resource list with `secrets` omitted (and no
#   exec/attach/proxy subresources).
# - Non-core API groups: `resources: ["*"]` is safe because Secret objects only
#   exist in the core group. The list is this cluster's actual API groups
#   (kubectl api-resources), minus auth/* and onepassword.com.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubectl-mcp-readonly
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - nonResourceURLs:
      - /api
      - /api/*
      - /apis
      - /apis/*
      - /healthz
      - /livez
      - /openapi
      - /openapi/*
      - /readyz
      - /version
      - /version/
    verbs:
      - get
  # Core v1 — everything except secrets.
  - apiGroups:
      - ""
    resources:
      - bindings
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - namespaces/status
      - nodes
      - nodes/status
      - persistentvolumeclaims
      - persistentvolumeclaims/status
      - persistentvolumes
      - persistentvolumes/status
      - pods
      - pods/log
      - pods/status
      - podtemplates
      - replicationcontrollers
      - replicationcontrollers/scale
      - replicationcontrollers/status
      - resourcequotas
      - resourcequotas/status
      - serviceaccounts
      - services
      - services/status
    verbs:
      - get
      - list
      - watch
  # All non-core API groups present on this cluster (Secret objects are not in
  # these groups). Keep in sync with `kubectl api-resources` after adding CRDs.
  - apiGroups:
      - acme.cert-manager.io
      - actions.github.com
      - admissionregistration.k8s.io
      - apiextensions.k8s.io
      - apiregistration.k8s.io
      - apps
      - autoscaling
      - barmancloud.cnpg.io
      - batch
      - ceph.rook.io
      - cert-manager.io
      - certificates.k8s.io
      - cilium.io
      - config.terraform.padok.cloud
      - coordination.k8s.io
      - csi.ceph.io
      - deuxfleurs.fr
      - discovery.k8s.io
      - dragonflydb.io
      - eventing.keda.sh
      - events.k8s.io
      - external-secrets.io
      - externaldns.k8s.io
      - flowcontrol.apiserver.k8s.io
      - fluxcd.controlplane.io
      - gateway.envoyproxy.io
      - gateway.networking.k8s.io
      - gateway.networking.x-k8s.io
      - generators.external-secrets.io
      - grafana.integreatly.org
      - groupsnapshot.storage.k8s.io
      - helm.toolkit.fluxcd.io
      - k8s.cni.cncf.io
      - keda.sh
      - kguardian.dev
      - kopiur.home-operations.com
      - kustomize.toolkit.fluxcd.io
      - metrics.k8s.io
      - monitoring.coreos.com
      - monitoring.giantswarm.io
      - networking.k8s.io
      - nfd.k8s-sigs.io
      - node.k8s.io
      - notification.toolkit.fluxcd.io
      - nvidia.com
      - objectbucket.io
      - observability.giantswarm.io
      - policy
      - postgresql.cnpg.io
      - rbac.authorization.k8s.io
      - resource.k8s.io
      - scheduling.k8s.io
      - shelly.thirdimpact.io
      - snapshot.storage.k8s.io
      - source.toolkit.fluxcd.io
      - storage.k8s.io
      - tailscale.com
      - talos.dev
      - tuppr.home-operations.com
      - upgrade.cattle.io
      - volsync.backube
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubectl-mcp-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubectl-mcp-readonly
subjects:
  - kind: ServiceAccount
    name: kubectl-mcp-readonly
    namespace: ai
