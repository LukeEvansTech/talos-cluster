---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-searxng
spec:
  chartRef:
    kind: OCIRepository
    name: mcp-searxng
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
    controllers:
      mcp-searxng:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/isokoliuk/mcp-searxng
              tag: 1.11.1@sha256:b6727fc950cf1a7501d70f863b563d9fc689d6e33c773296ed845070c5646b48
            env:
              SEARXNG_URL: http://searxng.default.svc.cluster.local:8080
              MCP_HTTP_PORT: &port 3000
              # Upstream flipped the default bind to 127.0.0.1 (localhost-only)
              # after v1.2.1, which silently broke every in-cluster consumer —
              # the ClusterIP Service needs the pod to listen on all interfaces.
              MCP_HTTP_HOST: 0.0.0.0
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        ports:
          http:
            port: *port
