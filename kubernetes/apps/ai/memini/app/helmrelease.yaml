---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: memini
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              # Embeddings + rerank served by the CPU llama.cpp pods in this ns.
              MEMINI_EMBED_BASE_URL: http://llama-embed.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: sentence-transformers/all-MiniLM-L6-v2
              MEMINI_EMBED_DIMS: "384"
              MEMINI_RERANK: http://llama-rerank.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker
              # Consolidation LLM via LiteLLM's self-hosted group (-> llmkube/llama.cpp).
              MEMINI_LLM_BASE_URL: http://litellm.ai.svc.cluster.local:4000
              MEMINI_LLM_MODEL: self-hosted
              MEMINI_LLM_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: llm-api-key
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: api-key
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        pod:
          # The data PVC is ReadWriteOnce (ceph-block), shared with the main
          # StatefulSet pod. Pin the fsck job to the node running main so both
          # can mount the RWO volume; otherwise the fsck pod Multi-Attach-stalls
          # in ContainerCreating until it happens to land on the right node.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: memini
                      app.kubernetes.io/controller: main
                  topologyKey: kubernetes.io/hostname
        # The chart's fsck curl uses --variable %MEMINI_API_KEY, so the fsck
        # container needs the same bearer token as the main container.
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: api-key
    persistence:
      data:
        existingClaim: memini
    route:
      internal:
        enabled: true
        hostnames:
          - "memini.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        # Chart v0.7.5 split the web UI onto its own `ui` service port (8081);
        # `http` (8080) is now API-only and 404s on `/`. This is a custom route
        # key, so it inherits neither of the chart's `main`/`ui` route defaults
        # and would otherwise fall back to the primary `http` port.
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: ui
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: ai
