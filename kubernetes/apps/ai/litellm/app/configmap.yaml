---
# yaml-language-server: $schema=https://json.schemastore.org/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
  namespace: ai
data:
  config.yaml: |-
    model_list:
      # ------------------------------------------------------------------
      # Local — llama.cpp (llama-nvidia). Served by the llmkube llama-nvidia
      # StatefulSet in the ai namespace.
      # ------------------------------------------------------------------

      # Stable "self-hosted" group. One backend today (llama-nvidia, order 1).
      - model_name: self-hosted
        model_info:
          mode: chat
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/self-hosted
          api_base: http://llama-nvidia.ai.svc.cluster.local:8080/v1
          api_key: llama-nvidia
          max_parallel_requests: 3
          order: 1

      # Uncensored Qwen3 MoE (mlabonne Qwen3-30B-A3B abliterated, mradermacher
      # imatrix Q4_K_S), served by the llmkube llama-uncensored InferenceService
      # (dedicated GPU, anti-affinity to llama-nvidia). Pick it explicitly.
      # Deliberately NOT in router_settings.fallbacks: a cloud fallback would
      # reintroduce refusals and defeat the point.
      - model_name: self-hosted-uncensored
        model_info:
          mode: chat
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/self-hosted-uncensored
          api_base: http://llama-uncensored.ai.svc.cluster.local:8080/v1
          api_key: llama-uncensored
          max_parallel_requests: 2

      # ------------------------------------------------------------------
      # Cloud
      # ------------------------------------------------------------------
      - model_name: openrouter/auto
        litellm_params:
          model: openrouter/openrouter/auto
          api_key: os.environ/OPENROUTER_API_KEY

      # ------------------------------------------------------------------
      # Embedding — served by the CPU llama-embed pod (all-MiniLM-L6-v2, 384-dim,
      # OpenAI /v1). Powers the MCP semantic tool filter below.
      # ------------------------------------------------------------------
      - model_name: all-minilm
        model_info:
          mode: embedding
        litellm_params:
          model: openai/sentence-transformers/all-MiniLM-L6-v2
          api_base: http://llama-embed.ai.svc.cluster.local:8080/v1
          api_key: llama-embed

      # ------------------------------------------------------------------
      # Optional cloud providers (Jory's set). To enable one: add its key to the
      # `litellm` 1Password item, add the matching line to externalsecret.yaml's
      # template, then uncomment. Disabled by default so a missing key can't fail
      # the deploy.
      # ------------------------------------------------------------------
      # - model_name: kimi-k2                       # Moonshot
      #   model_info: {mode: chat, supports_function_calling: true}
      #   litellm_params:
      #     model: moonshot/kimi-k2
      #     api_base: https://api.moonshot.ai/v1
      #     api_key: os.environ/MOONSHOT_API_KEY
      # - model_name: MiniMax                       # MiniMax (Anthropic-format)
      #   model_info: {mode: messages, supports_function_calling: true, supports_vision: true}
      #   litellm_params:
      #     model: minimax/MiniMax-M2
      #     api_base: https://api.minimax.io/anthropic/v1/messages
      #     api_key: os.environ/MINIMAX_API_KEY
      #     cache_control_injection_points:
      #       - {location: message, role: system}
      #       - {location: message, index: -1}
      # - model_name: zen/glm                       # OpenCode "zen" (one key, many models)
      #   model_info: {mode: chat, supports_function_calling: true}
      #   litellm_params:
      #     model: openai/glm-4.6
      #     api_base: https://opencode.ai/zen/go/v1
      #     api_key: os.environ/OPENCODE_API_KEY

    router_settings:
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT
      redis_password: os.environ/REDIS_PASSWORD
      cooldown_time: 30
      enable_pre_call_checks: true
      # If the local model is cooling-down / unhealthy, spill to cloud.
      fallbacks:
        - self-hosted: ["openrouter/auto"]
      # Prompts that overflow the 32k self-hosted context spill to the larger
      # 64k self-hosted-uncensored model (YaRN-extended) instead of erroring.
      # ContextWindowExceededError only — orthogonal to the health fallback above.
      context_window_fallbacks:
        - self-hosted: ["self-hosted-uncensored"]

    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      require_auth_for_metrics_endpoint: false
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        ttl: 30
      drop_params: true
      num_retries: 2
      request_timeout: 600
      # Surfaces only the top-k relevant MCP tools per request (7 servers) using
      # the all-minilm embedding model above.
      mcp_semantic_tool_filter:
        enabled: true
        embedding_model: all-minilm
        top_k: 8
        similarity_threshold: 0.3

    # MCP tools proxied to any LiteLLM client (ToolHive-managed endpoints, ai ns).
    # 7 servers — the semantic filter above trims each request to the top-k
    # relevant tools.
    mcp_servers:
      kubectl:
        url: http://mcp-kubectl.ai.svc.cluster.local:8000/mcp
      flux:
        url: http://mcp-flux.ai.svc.cluster.local:8000/mcp
      talos:
        url: http://mcp-talos-mcp.ai.svc.cluster.local:8080/mcp
      searxng:
        url: http://mcp-searxng.ai.svc.cluster.local:3000/mcp
      github:
        url: http://mcp-github-proxy.ai.svc.cluster.local:8080/mcp
      grafana:
        url: http://mcp-grafana-proxy.ai.svc.cluster.local:8080/mcp
      # Sonarr/Radarr/Prowlarr tools (mcp-arr). stdio server behind ToolHive's
      # streamable-http proxy, same as github/grafana above.
      arr:
        url: http://mcp-arr-proxy.ai.svc.cluster.local:8080/mcp

    general_settings:
      health_check_endpoint: /v1/health
