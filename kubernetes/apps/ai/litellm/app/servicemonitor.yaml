---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: &app litellm
  labels:
    app.kubernetes.io/name: *app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  namespaceSelector:
    matchNames:
      - ai
  endpoints:
    - port: http
      path: /metrics/
      interval: 30s
      scrapeTimeout: 10s
