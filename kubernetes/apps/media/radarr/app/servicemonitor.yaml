---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: radarr
  labels:
    app.kubernetes.io/name: radarr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: radarr
  endpoints:
    - port: metrics
      scheme: http
      # ENABLE_ADDITIONAL_METRICS iterates every movie; scrape less often and
      # allow more time (matches sonarr; the standard exportarr pattern).
      path: /metrics
      interval: 5m
      scrapeTimeout: 2m
      relabelings:
        - action: replace
          targetLabel: instance
          replacement: radarr
