---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sonarr
  labels:
    app.kubernetes.io/name: sonarr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: sonarr
  endpoints:
    - port: metrics
      scheme: http
      # ENABLE_ADDITIONAL_METRICS iterates every series/episode, so the scrape
      # runs long (it exceeds the default 10s scrapeTimeout on a large library).
      # Scrape less often and allow more time — the standard exportarr pattern.
      path: /metrics
      interval: 5m
      scrapeTimeout: 2m
      relabelings:
        - action: replace
          targetLabel: instance
          replacement: sonarr
