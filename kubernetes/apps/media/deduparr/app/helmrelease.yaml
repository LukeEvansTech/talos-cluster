---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deduparr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: deduparr
  values:
    controllers:
      deduparr:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/kernald/deduparr
              tag: 1.2.1@sha256:3e21ecd8e048cbb1e66e279b6255aa6ee9f76406254ae3f2f90995947f514695
            env:
              # Verified: dry-run found 0 duplicates across all runs; safe to act when one appears.
              DEDUPARR_ACTION: remove
              DEDUPARR_LOG_LEVEL: debug
              DEDUPARR_RADARR_MOVIES_ENABLED: true
              DEDUPARR_RADARR_MOVIES_URL: http://radarr.media.svc.cluster.local
              DEDUPARR_REMOVE_FROM_CLIENT: false
              DEDUPARR_SCHEDULE: service
              DEDUPARR_SERVICE__INTERVAL: 2m
              DEDUPARR_SERVICE__PORT: &port 80
              DEDUPARR_SONARR_SERIES_ENABLED: true
              DEDUPARR_SONARR_SERIES_URL: http://sonarr.media.svc.cluster.local
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: deduparr-secret
            probes:
              # deduparr runs a dedup cycle every DEDUPARR_SERVICE__INTERVAL (2m),
              # during which its single-threaded HTTP server stalls /health/ready
              # for ~13s. Tolerant liveness (3 x 30s, 10s timeout = ~90s) rides out
              # the in-run stall while still restarting a genuinely hung process.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: deduparr
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        serviceName: deduparr
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
