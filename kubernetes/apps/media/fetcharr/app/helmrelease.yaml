---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fetcharr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: fetcharr
  values:
    controllers:
      fetcharr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/egg82/fetcharr
              tag: 2.0.1@sha256:8b667f26e2621df4494ba24f63a47ebc38516bbf262220ac2debe4821e411ee1
            env:
              TZ: ${TIMEZONE}
              SEARCH_INTERVAL: 1hour
              SEARCH_AMOUNT: "5"
              MONITORED_ONLY: "true"
              MISSING_ONLY: "false"
              RADARR_0_URL: http://radarr.media.svc.cluster.local
              SONARR_0_URL: http://sonarr.media.svc.cluster.local
            envFrom:
              - secretRef:
                  name: fetcharr-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /app/config
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/cache
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      tmp:
        type: emptyDir
