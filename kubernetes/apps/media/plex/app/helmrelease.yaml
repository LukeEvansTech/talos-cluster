---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: plex
  values:
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            # Cap pod egress at the BPF EDT layer (Cilium BandwidthManager).
            # Plex pins its sockets to BBR via setsockopt, and on LAN RTTs
            # BBR bursts at ~1 Gbps into Apple TV receive windows that only
            # tolerate ~10-20 Mbps, causing the losses → MSS collapse → cwnd
            # crash cycle that produces ~60s buffering pauses every ~6 min.
            # 200M leaves generous headroom for several concurrent streams
            # while neutralising BBR's LAN-burst pacing.
            # See docs/known-issues.md "Plex Direct-Play Buffering on LAN
            # Apple TVs (BBR + MTU Probing)" for full investigation.
            kubernetes.io/egress-bandwidth: "200M"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96
            env:
              TZ: "${TIMEZONE}"
              ALLOWED_NETWORKS: "${CR_LAN_CIDR:-0.0.0.0/0},${GH_LAN_CIDR:-0.0.0.0/0}"
              PLEX_ADVERTISE_URL: "http://${SVC_PLEX_ADDR:-127.0.0.1}:32400,https://plex.${SECRET_DOMAIN:-local}:443"
              PLEX_PREFERENCE_1: "AllowMediaDeletion=0"
              PLEX_PREFERENCE_2: "EnableIPv6=0"
              PLEX_PREFERENCE_3: "FriendlyName=Talos Plex"
              PLEX_PREFERENCE_4: "LanNetworksBandwidth=${CR_LAN_CIDR:-0.0.0.0/0},${GH_LAN_CIDR:-0.0.0.0/0}"
              # Hardware transcoding
              PLEX_PREFERENCE_5: "HardwareAcceleratedCodecs=1"
              PLEX_PREFERENCE_6: "HardwareAcceleratedEncoders=1"
              PLEX_PREFERENCE_7: "TranscoderTempDirectory=/transcode"
              # Disable services that don't work in Kubernetes
              PLEX_PREFERENCE_8: "GdmEnabled=0"
              PLEX_PREFERENCE_9: "DlnaEnabled=0"
              PLEX_PREFERENCE_10: "RelayEnabled=0"
              # Reduce NFS I/O
              PLEX_PREFERENCE_11: "ButlerTaskDeepMediaAnalysis=0"
              # Performance tuning
              PLEX_PREFERENCE_12: "ScannerLowPriority=1"
              PLEX_PREFERENCE_13: "logDebug=0"
              # Limit remote streams to 20 Mbps (forces 4K to transcode)
              PLEX_PREFERENCE_14: "WanPerStreamMaxUploadRate=20000"
              LD_LIBRARY_PATH: "/usr/local/glibc/usr/lib"
              HARDWARE_DEVICE_PATH: "/dev/nvidia0"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 2000m
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                nvidia.com/gpu: 1
                memory: 16Gi
    defaultPodOptions:
      labels:
        gpu-workload: "true"
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              gpu-workload: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 10000
        seccompProfile: {type: RuntimeDefault}
    service: # TODO: Tidy up supplementalGroups when we have a better understanding of what's needed from a TrueNAS perspective
      app:
        controller: plex
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_PLEX_ADDR}
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: external
            url: https://plex.${SECRET_DOMAIN}/identity
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        # TODO: If setting up Plex for the first time, you'll want to add the globalMounts section
        # globalMounts:
        #   - path: /config/Library/Application Support/Plex Media Server
      # Separate PVC for cache to avoid backing up cache files
      cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Cache
      config-logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      tmp:
        type: emptyDir
      transcode:
        type: emptyDir
      media:
        type: nfs
        server: ${SECRET_STORAGE_SERVER:-localhost}
        path: /mnt/pool/media
        globalMounts:
          - path: /media
            readOnly: true
