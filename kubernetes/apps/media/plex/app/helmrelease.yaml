---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 1h
  # Recreate strategy + terminationGracePeriodSeconds=300 means a rollout can
  # legitimately spend ~5min waiting for the old pod to exit; Helm's default 5m
  # timeout then fails the upgrade and Flux rolls back mid-rollout. Same failure
  # mode and fix as dapperdivers/dapper-cluster.
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: plex
  values:
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            # Cap pod egress at the BPF EDT layer (Cilium BandwidthManager).
            # Plex pins its sockets to BBR via setsockopt, and on LAN RTTs
            # BBR bursts at ~1 Gbps into Apple TV receive windows that only
            # tolerate ~10-20 Mbps, causing the losses → MSS collapse → cwnd
            # crash cycle that produces ~60s buffering pauses every ~6 min.
            # 200M leaves generous headroom for several concurrent streams
            # while neutralising BBR's LAN-burst pacing.
            # See docs/docs/troubleshooting/kb/002-plex-direct-play-buffering-bbr-mtu-probing.md "Plex Direct-Play Buffering on LAN
            # Apple TVs (BBR + MTU Probing)" for full investigation.
            kubernetes.io/egress-bandwidth: "200M"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687@sha256:be00a2ad851ea3193cd870636f908eb6425ad89390f23cdb08daa35ab5cceacc
            env:
              TZ: "${TIMEZONE}"
              PLEX_NO_AUTH_NETWORKS: "${CR_LAN_CIDR:-0.0.0.0/0},${GH_LAN_CIDR:-0.0.0.0/0}"
              # Note: everything here is published to plex.tv as a candidate connection
              # (KB-003) — the svc URL is unresolvable off-cluster and skipped fast by
              # clients, but gives the ~10 in-cluster companions a direct, non-hairpin path.
              PLEX_ADVERTISE_URL: "http://${SVC_PLEX_ADDR:-127.0.0.1}:32400,https://plex.${SECRET_DOMAIN:-local}:443,http://plex.media.svc.cluster.local:32400"
              PLEX_PREFERENCE_1: "AllowMediaDeletion=0"
              PLEX_PREFERENCE_2: "EnableIPv6=0"
              PLEX_PREFERENCE_3: "FriendlyName=Talos Plex"
              PLEX_PREFERENCE_4: "LanNetworksBandwidth=${CR_LAN_CIDR:-0.0.0.0/0},${GH_LAN_CIDR:-0.0.0.0/0}"
              # Hardware transcoding
              PLEX_PREFERENCE_5: "HardwareAcceleratedCodecs=1"
              PLEX_PREFERENCE_6: "HardwareAcceleratedEncoders=1"
              # (7 retired: TranscoderTempDirectory=/transcode is the image entrypoint default)
              # Disable services that don't work in Kubernetes
              PLEX_PREFERENCE_8: "GdmEnabled=0"
              PLEX_PREFERENCE_9: "DlnaEnabled=0"
              PLEX_PREFERENCE_10: "RelayEnabled=0"
              # Reduce NFS I/O
              PLEX_PREFERENCE_11: "ButlerTaskDeepMediaAnalysis=0"
              # Performance tuning
              PLEX_PREFERENCE_12: "ScannerLowPriority=1"
              PLEX_PREFERENCE_13: "logDebug=0"
              # Limit remote streams to 20 Mbps (forces 4K to transcode; see KB-018)
              PLEX_PREFERENCE_14: "WanPerStreamMaxUploadRate=20000"
              # Total remote-stream budget (~5 concurrent at the per-stream cap). Was
              # live-only (set via the UI); declared here to remove the git/live drift.
              PLEX_PREFERENCE_15: "WanTotalMaxUploadRate=100000"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 2000m
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                nvidia.com/gpu: 1
                memory: 16Gi
          # Plex only logs to files, never stdout — tail the main log so the
          # VictoriaLogs collector ships it like every other app. The Logs dir is
          # an emptyDir (config-logs) already globalMounted into all containers.
          logs:
            image:
              repository: mirror.gcr.io/library/busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - tail -n0 -F "/config/Library/Application Support/Plex Media Server/Logs/Plex Media Server.log"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      labels:
        gpu-workload: "true"
      # Let Plex checkpoint its SQLite DB cleanly on shutdown instead of being
      # SIGKILLed at the 30s default mid-write.
      terminationGracePeriodSeconds: 300
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              gpu-workload: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: plex
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_PLEX_ADDR}
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: external
            url: https://plex.${SECRET_DOMAIN}/identity
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          # Strip Range on external-subtitle fetches — SRT subtitles break through a
          # reverse proxy otherwise.
          # Ref: https://forums.plex.tv/t/external-srt-subtitles-are-not-working-w-reverse-proxy/886540
          - matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove: ["Range"]
            backendRefs:
              - identifier: app
                port: *port
            timeouts:
              request: 0s
              backendRequest: 0s
          # Plex needs long-lived connections beyond Envoy's default route timeout:
          # transcode decisions can take >15s, streams run for hours, and
          # /:/eventsource/notifications is an SSE stream held open all session —
          # Envoy otherwise returns 504 "upstream request timeout". 0s disables it.
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: *port
            timeouts:
              request: 0s
              backendRequest: 0s
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        # TODO: If setting up Plex for the first time, you'll want to add the globalMounts section
        # globalMounts:
        #   - path: /config/Library/Application Support/Plex Media Server
      # Separate PVC for cache to avoid backing up cache files
      cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Cache
      config-logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      # Custom client-profile overrides (KB-026: tvOS EAC3 direct-play freeze).
      # Remove this mount to restore stock client profiles.
      profiles:
        type: configMap
        name: plex-client-profiles
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Profiles
      tmp:
        type: emptyDir
      transcode:
        type: emptyDir
      media:
        type: nfs
        server: ${SECRET_STORAGE_SERVER:-localhost}
        path: /mnt/pool/media
        globalMounts:
          - path: /media
            readOnly: true
