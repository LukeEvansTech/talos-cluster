---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: todoist-sort
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: todoist-sort
  values:
    controllers:
      sort-inbox:
        type: cronjob
        cronjob:
          schedule: "*/5 7-22 * * *"
          timeZone: &timeZone Europe/London
          concurrencyPolicy: Forbid
          # Kill a wedged run so Forbid doesn't skip every subsequent */5
          # window; the next tick recovers. 660 = 2 x 300s LLM attempts
          # ([llm] timeout in config.toml) + Todoist I/O headroom; the old
          # 300 was calibrated to the previously hard-wired 120s timeout.
          activeDeadlineSeconds: 660
          # The */5 schedule IS the retry loop — don't respawn pods that
          # re-call the LLM while Forbid skips windows.
          backoffLimit: 0
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image: &image
              repository: ghcr.io/lukeevanstech/todoist-sort
              tag: 0.2.2
            command:
              - "sort-inbox"
              - "--root"
              - "/config"
            env: &env
              TZ: *timeZone
            envFrom: &envFrom
              - secretRef:
                  name: todoist-sort-secret
            resources: &resources
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
      plan-day:
        type: cronjob
        cronjob:
          schedule: "0 7 * * *"
          timeZone: *timeZone
          concurrencyPolicy: Forbid
          # 660 = 2 x 300s LLM attempts ([llm] timeout in config.toml) +
          # Todoist I/O headroom; the old 600 was calibrated to the
          # previously hard-wired 120s timeout.
          activeDeadlineSeconds: 660
          # No retries: the promotion budget (max_today) is per-process, so
          # a retried plan pass could promote up to 5 MORE tasks — the retry
          # budget breaks the <=max_today invariant. A missed morning
          # self-heals tomorrow at 07:00.
          backoffLimit: 0
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image: *image
            command:
              - "plan-day"
              - "--root"
              - "/config"
            env: *env
            envFrom: *envFrom
            resources: *resources
            securityContext: *securityContext
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      config:
        type: configMap
        name: todoist-sort-config
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
        # CLI flock lives here; root filesystem is read-only
        globalMounts:
          - path: /tmp
