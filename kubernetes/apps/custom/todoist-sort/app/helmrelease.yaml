---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: todoist-sort
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: todoist-sort
  values:
    controllers:
      sort-inbox:
        type: cronjob
        cronjob:
          # Every 15 min during the dry-run week (was */5). Sorting is
          # log-only for now, so latency is free — fewer runs = fewer chances
          # to hit a transient Todoist blip and page. Revisit at the flip,
          # where faster capture-to-file matters.
          schedule: "*/15 7-22 * * *"
          timeZone: &timeZone Europe/London
          concurrencyPolicy: Forbid
          # Kill a wedged run so Forbid doesn't skip every subsequent */5
          # window; the next tick recovers. 660 covers 2 x 300s LLM attempts
          # ([llm] timeout in config.toml) + the [llm] retry_backoff between
          # them (35s) + Todoist I/O headroom: 300+35+300 = 635 < 660.
          activeDeadlineSeconds: 660
          # One k8s-level retry: a transient Todoist 5xx that outlasts the
          # in-pod retry (seen 2026-07-12: ~6s of 503 on GET /user) fails the
          # pod; a single respawn ~10s later usually lands after recovery,
          # turning a self-healing blip into a silent success instead of a
          # page. Safe here — the sort pass is idempotent (moved items leave
          # the Inbox, flagged items carry the skip label) and the common
          # failure is pre-LLM (GET /user), so a respawn re-spends no LLM.
          backoffLimit: 1
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            # NOT anchored/aliased into plan-day: Renovate's helm-values
            # extractor walks the resolved YAML, so an `image: *image` alias
            # becomes a second identical dep whose digest-pin write corrupts
            # the first (tag@sha256@sha256), crashing the whole combined
            # renovate/pin-dependencies branch (renovate#24942 family).
            image:
              repository: ghcr.io/lukeevanstech/todoist-sort
              tag: 0.2.5@sha256:a2d635251728d77b9b73dc8026e4b43233e60b761dbec66324306a46f30d9783
            command:
              - "sort-inbox"
              - "--root"
              - "/config"
            env: &env
              TZ: *timeZone
            envFrom: &envFrom
              - secretRef:
                  name: todoist-sort-secret
            resources: &resources
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
      plan-day:
        type: cronjob
        cronjob:
          schedule: "0 7 * * *"
          timeZone: *timeZone
          concurrencyPolicy: Forbid
          # 660 covers 2 x 300s LLM attempts ([llm] timeout in config.toml) +
          # the [llm] retry_backoff between them (35s) + Todoist I/O headroom:
          # 300+35+300 = 635 < 660.
          activeDeadlineSeconds: 660
          # backoffLimit STAYS 0 — do not raise it. The promotion budget
          # (max_today) is per-process, so a k8s job retry (a new process)
          # could promote up to 5 MORE tasks, breaking the <=max_today
          # invariant. Transient LLM blips (e.g. the 2026-07-24 07:00 miss: a
          # LiteLLM cooldown 400) are instead absorbed IN-PROCESS by the [llm]
          # retry_backoff (todoist-sort >=0.2.5), which shares the one budget.
          # What the in-pod retry can't recover self-heals at 07:00 tomorrow.
          backoffLimit: 0
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            # Duplicated from sort-inbox on purpose — see the comment there.
            image:
              repository: ghcr.io/lukeevanstech/todoist-sort
              tag: 0.2.5@sha256:a2d635251728d77b9b73dc8026e4b43233e60b761dbec66324306a46f30d9783
            command:
              - "plan-day"
              - "--root"
              - "/config"
            env: *env
            envFrom: *envFrom
            resources: *resources
            securityContext: *securityContext
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      config:
        type: configMap
        name: todoist-sort-config
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
        # CLI flock lives here; root filesystem is read-only
        globalMounts:
          - path: /tmp
