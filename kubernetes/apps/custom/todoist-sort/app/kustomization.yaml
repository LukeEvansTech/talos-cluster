---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./externalsecret.yaml
configMapGenerator:
  - name: todoist-sort-config
    files:
      - ./resources/config.toml
      - ./resources/routing.md
      - ./resources/classifier.md
      - ./resources/planner.md
generatorOptions:
  disableNameSuffixHash: true
