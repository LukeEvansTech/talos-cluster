---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Syncs the private shelly-fleet repo (device name map, ShellyProfiles, wifi
# credential ExternalSecret). dependsOn shelly-operator so the Shelly CRDs
# (shipped in the operator chart) exist before profiles are applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shelly-fleet-sync
spec:
  dependsOn:
    - name: shelly-operator
      namespace: home
  interval: 1h
  path: ./kubernetes
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: shelly-fleet
  timeout: 5m
  wait: false
