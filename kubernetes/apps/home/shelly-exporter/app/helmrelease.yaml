---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app shelly-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      shelly-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/lukeevanstech/shelly-prometheus-exporter
              # 0.4.0 adds Shelly Gen2 digest auth; with SHELLY_PASSWORD (env
              # below, from the auth-credentials Secret) it authenticates to
              # plugs that have auth on, and is a clean no-op on those that
              # don't (digest only engages on a 401).
              tag: 0.4.0@sha256:807220f4c0ea659e8e7c72fe52b74ef430bafd660b4ea3b56e83cc14f5a03648
            args:
              - --config
              - /config/config.yaml
            env:
              TZ: ${TIMEZONE:=UTC}
              # Shelly device admin auth (fleet auth rollout SP-2). optional:
              # true so the exporter keeps running UNauthenticated until the
              # auth-credentials Secret exists (created by the shelly-fleet
              # externalsecret-auth.yaml, SP-3) -- a missing Secret will not
              # block the pod from starting.
              SHELLY_USERNAME: admin
              SHELLY_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: auth-credentials
                    key: password
                    optional: true
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        controller: *app
        ports:
          metrics:
            port: 8080
            protocol: TCP
    persistence:
      config:
        # Rendered by shelly-operator's exporter feed (replaces the old
        # 1Password "Shelly Exporter" inventory ExternalSecret).
        type: configMap
        name: shelly-exporter-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true
