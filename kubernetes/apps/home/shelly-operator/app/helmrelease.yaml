---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelly-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: shelly-operator
  # The chart ships CRDs in crds/; helm-controller skips CRD upgrades by
  # default, so 0.2.0's new fields (firmware section, availableFirmware)
  # need an explicit CreateReplace policy.
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    image:
      repository: ghcr.io/lukeevanstech/shelly-operator
      tag: 0.3.1@sha256:8c0c019036f4f219345e85a865a0cbd883bc96e8d12b4c7332dc59119986ba63
    discovery:
      # Substituted from cluster-secrets (public repo: no literal LAN CIDRs).
      # IOT_TRUSTED_NETWORK_CIDR is the IoT VLAN the whole fleet lives on
      # (migration completed 2026-06-12; the old flat-LAN CIDR was dropped
      # from the sweep in Phase 5 cleanup).
      cidrs:
        - "${IOT_TRUSTED_NETWORK_CIDR}"
    deviceNamespace: home
    nameMap: shelly-names
    exporterConfigMap: shelly-exporter-config
    dashboard:
      enabled: true
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
    reloader: true
