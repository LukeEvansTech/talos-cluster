---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: mosquitto
  values:
    controllers:
      mosquitto:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
            env:
              TZ: ${TIMEZONE}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
        statefulset:
          volumeClaimTemplates:
            - name: data
              storageClass: openebs-hostpath
              accessMode: ReadWriteOnce
              size: 1Gi
              globalMounts:
                - path: /mosquitto/data
    defaultPodOptions:
      annotations:
        # macvlan on VLAN 68 (IoT-Trusted) so external VLAN-68 clients (Shellys)
        # reach the broker on-link at 10.32.68.25 (${SVC_MOSQUITTO_ADDR}).
        # In-cluster clients (HA/z2m) use the ClusterIP/DNS. Matches the
        # HA (.15) / z2m (.20) macvlan pattern; broker = .25.
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "iot",
            "namespace": "kube-system",
            "ips": ["10.32.68.25/23"],
            "mac": "02:00:00:00:00:03"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: mosquitto
        # ClusterIP for in-cluster clients (mosquitto.home.svc.cluster.local).
        # External VLAN-68 clients reach the broker via the pod's macvlan IP
        # (10.32.68.25), configured in defaultPodOptions above.
        type: ClusterIP
        ports:
          mqtt:
            port: 1883
    configMaps:
      config:
        data:
          mosquitto.conf: |-
            allow_anonymous true
            autosave_interval 60
            connection_messages false
            listener 1883
            per_listener_settings false
            persistence true
            persistence_location /mosquitto/data
    persistence:
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
