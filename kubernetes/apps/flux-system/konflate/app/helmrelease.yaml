---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      # Public repo → App auth lifts the API rate limit and supplies the write
      # identity. A missed-webhook backstop re-renders open PRs (and reconciles
      # the PR list) on this interval.
      repo: github://LukeEvansTech/talos-cluster
      refreshInterval: 15m
      logFormat: json
      # Post the native `Konflate` commit status + PR summary comment per
      # render (replaced the deleted flate.yaml/konflate.yaml CI workflows —
      # PR validation now happens entirely in-cluster). statusCheckName left
      # unset → defaults to "Konflate".
      statusChecks: true
      prComments: true
      publicUrl: "https://konflate.${SECRET_DOMAIN}"
    secret:
      # KONFLATE_PUSH_TOKEN — bearer for POST /api/prs/{n}/refresh, forcing a
      # re-render of a PR's new head ahead of the 15m poll. With the CI
      # workflows gone the webhook is the primary trigger; the token remains
      # for manual/scripted refreshes.
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    persistence:
      # Ephemeral cache on the node filesystem (chart default). Konflate's
      # source/render/stage caches are millions of tiny files (~1.3M inodes
      # at only ~5.6GB), which exhaust a fixed-inode ceph-block RBD volume
      # long before its byte budget (repeatedly fired
      # KubePersistentVolumeInodesFillingUp). The caches are bounded by bytes
      # + TTL, not inodes, so emptyDir on Talos /var (xfs, dynamic inodes) is
      # the right home. Tradeoff: open-PR diffs re-render and the merged-PR
      # shelf is lost on a konflate restart — acceptable for a diff UI.
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        # With persistence off, a restart re-renders every open PR from cold
        # (~18 concurrent renders); 1Gi OOM-killed the pod in a crash loop.
        # GOMEMLIMIT is derived from this (90%), so the GC tracks the ceiling.
        memory: 2Gi
