---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      # Public repo → anonymous read is sufficient. A missed-webhook backstop
      # re-renders open PRs (and reconciles the PR list) on this interval.
      repo: github://LukeEvansTech/talos-cluster
      refreshInterval: 15m
      logFormat: json
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        - "{{ .Release.Name }}.${SECRET_INTERNAL_DOMAIN}"
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 5Gi
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
