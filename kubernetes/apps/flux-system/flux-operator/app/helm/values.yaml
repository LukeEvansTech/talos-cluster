---
serviceMonitor:
  create: true
web:
  enabled: true
  config:
    authentication:
      type: Anonymous
      anonymous:
        username: flux
        groups:
          - flux-admin
  httpRoute:
    enabled: true
    hostnames:
      - flux.${SECRET_DOMAIN}
      - flux.${SECRET_INTERNAL_DOMAIN}
    parentRefs:
      - name: envoy-internal
        namespace: network
  networkPolicy:
    create: false
