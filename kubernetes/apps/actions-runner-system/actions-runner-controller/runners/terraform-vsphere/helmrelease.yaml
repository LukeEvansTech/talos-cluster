---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name terraform-vsphere-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set-terraform-vsphere
  interval: 1h
  values:
    fullnameOverride: *name
    githubConfigUrl: https://github.com/codelooks-com/terraform-vsphere
    githubConfigSecret: terraform-vsphere-runner-secret
    runnerGroup: default
    runnerScaleSetName: terraform-vsphere
    maxRunners: 2
    minRunners: 0
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: miroir-local
        resources:
          requests:
            # Remote state + small providers — terraform needs little scratch.
            storage: 5Gi
    template:
      spec:
        # miroir-local provisions a real ext4 block device, whose root directory
        # comes up root:root 0755. The openebs-hostpath directory it replaced
        # (#3583) was already writable, so nothing here needed fsGroup before.
        # This image runs as uid/gid 1001, so without the chown below the runner
        # cannot create _work/_tool and every job dies in ~2s with
        # UnauthorizedAccessException before a single step executes.
        # miroir's CSIDriver is fsGroupPolicy: ReadWriteOnceWithFSType and this
        # claim is RWO + ext4, so kubelet honours fsGroup and chowns the volume.
        securityContext:
          fsGroup: 1001
        serviceAccountName: terraform-vsphere-runner
        containers:
          - name: runner
            # Generic home-operations runner (same digest as talos-cluster-runner).
            # The IaC binary (tofu/terraform) is installed by the workflow in Plan 4.
            # Renovate manages this digest.
            image: ghcr.io/home-operations/actions-runner:2.335.1@sha256:0c6f38e8194f6c3714aa86c6dc8a72574484818ed625dd66074920b25c118508
            command:
              - "/home/runner/run.sh"
            env:
              # kubernetes mode defaults this to "true" (refuses plain run: jobs).
              # Our steps run directly on the runner, so it must be "false".
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
            envFrom:
              - secretRef:
                  name: terraform-vsphere-creds
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
