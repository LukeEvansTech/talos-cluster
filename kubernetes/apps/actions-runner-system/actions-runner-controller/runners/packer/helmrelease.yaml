---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name packer-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set-packer
  interval: 1h
  values:
    fullnameOverride: *name
    githubConfigUrl: https://github.com/codelooks-com/packer-vsphere
    githubConfigSecret: packer-runner-secret
    runnerGroup: default
    runnerScaleSetName: packer-vsphere
    maxRunners: 3
    minRunners: 0
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: miroir-local
        resources:
          requests:
            storage: 40Gi
    template:
      spec:
        # miroir-local provisions a real ext4 block device, whose root directory
        # comes up root:root 0755. The openebs-hostpath directory it replaced
        # (#3583) was already writable, so nothing here needed fsGroup before.
        # This image runs as uid/gid 1001, so without the chown below the runner
        # cannot create _work/_tool and every job dies in ~2s with
        # UnauthorizedAccessException before a single step executes.
        # miroir's CSIDriver is fsGroupPolicy: ReadWriteOnceWithFSType and this
        # claim is RWO + ext4, so kubelet honours fsGroup and chowns the volume.
        securityContext:
          fsGroup: 1001
        serviceAccountName: packer-runner
        containers:
          - name: runner
            # Pinned to an immutable digest (matches the home-operations
            # actions-runner convention). Mutable :latest let nodes keep a
            # stale cached image whose baked ansible venv/pywinrm was absent,
            # so Windows WinRM provisioning failed with "No module named
            # 'winrm'". Renovate bumps the digest as new images are built.
            image: ghcr.io/codelooks-com/packer-runner:latest@sha256:6bb2a82f5bfd6c95175a298b4576c8486ea6675a92e045741058d18b738b286a
            command:
              - "/home/runner/run.sh"
            env:
              # containerMode: kubernetes defaults this to "true", which REFUSES
              # plain `run:` jobs. Our tools live in the runner image and steps run
              # directly on it, so this must be "false" (the existing
              # talos-cluster-runner sets it too).
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
            envFrom:
              - secretRef:
                  name: packer-vsphere-creds
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
