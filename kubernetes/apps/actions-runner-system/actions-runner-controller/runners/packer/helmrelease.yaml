---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name packer-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set-packer
  interval: 1h
  values:
    fullnameOverride: *name
    githubConfigUrl: https://github.com/codelooks-com/packer-vsphere
    githubConfigSecret: packer-runner-secret
    runnerGroup: default
    runnerScaleSetName: packer-vsphere
    maxRunners: 3
    minRunners: 0
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: miroir-local
        resources:
          requests:
            storage: 40Gi
    template:
      spec:
        serviceAccountName: packer-runner
        containers:
          - name: runner
            # Pinned to an immutable digest (matches the home-operations
            # actions-runner convention). Mutable :latest let nodes keep a
            # stale cached image whose baked ansible venv/pywinrm was absent,
            # so Windows WinRM provisioning failed with "No module named
            # 'winrm'". Renovate bumps the digest as new images are built.
            image: ghcr.io/codelooks-com/packer-runner:latest@sha256:4c5e18278a58615d43b8ffe2748225f8b80daa422396f24449f9c91845d97efc
            command:
              - "/home/runner/run.sh"
            env:
              # containerMode: kubernetes defaults this to "true", which REFUSES
              # plain `run:` jobs. Our tools live in the runner image and steps run
              # directly on it, so this must be "false" (the existing
              # talos-cluster-runner sets it too).
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
            envFrom:
              - secretRef:
                  name: packer-vsphere-creds
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
