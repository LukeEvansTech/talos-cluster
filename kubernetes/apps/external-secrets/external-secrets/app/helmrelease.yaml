---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: external-secrets
    namespace: external-secrets
  values:
    installCRDs: true
    leaderElect: true
    # Expose controller/webhook/cert-controller metrics (:8080) and scrape them —
    # the bundled Grafana dashboard (grafanaDashboard below) is blank without this.
    serviceMonitor:
      enabled: true
      interval: 1m
    metrics:
      service:
        enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
    certController:
      metrics:
        service:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    grafanaDashboard:
      enabled: true
      annotations:
        grafana_folder: External-Secrets
    webhook:
      replicaCount: 2
      metrics:
        service:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 256Mi
        limits:
          memory: 256Mi
