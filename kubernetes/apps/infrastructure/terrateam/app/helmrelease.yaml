---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: terrateam
spec:
  interval: 1h
  chart:
    spec:
      chart: terrateam
      version: 1.3.1
      sourceRef:
        kind: HelmRepository
        name: terrateamio
        namespace: infrastructure
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    terrateam:
      config:
        fqdn: terrateam.${SECRET_DOMAIN}
        uiBase: https://terrateam.${SECRET_DOMAIN}
        github:
          appUrl: https://github.com/apps/terrateam-codelooks
          appIdSecretName: terrateam-github
          appIdSecretKey: app-id
          appClientIdSecretName: terrateam-github
          appClientIdSecretKey: client-id
          appClientSecretSecretName: terrateam-github
          appClientSecretSecretKey: client-secret
          appPrivatePemCertificateSecretName: terrateam-github
          appPrivatePemCertificateSecretKey: private-key
          webhookSecretName: terrateam-github
          webhookSecretKey: webhook-secret
        db:
          hostname: postgres18-rw.database.svc.cluster.local
          port: 5432
          databaseName: terrateam
          username: terrateam
          passwordSecretName: terrateam-db
          passwordSecretKey: password
    # Use the shared cluster-wide CNPG (database/postgres18) so terrateam is covered by the
    # postgres18-s3 barman backup. The terrateam database + role are provisioned on it by the
    # postgres-init Job (db-init-job.yaml). Disable the chart's bundled Postgres.
    db:
      enabled: false
