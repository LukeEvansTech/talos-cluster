---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/job_v1.json
# Idempotently create the `terrateam` database + role on the shared CNPG (postgres18),
# as the superuser. Same postgres-init image used by netbox et al., run as a standalone
# Job because the terrateam chart cannot inject an initContainer. The terrateam server
# retries its DB pool until this completes, so strict ordering is not required.
apiVersion: batch/v1
kind: Job
metadata:
  name: terrateam-db-init
  namespace: infrastructure
  annotations:
    # Re-run on each apply so a rotated/changed password is re-asserted (idempotent).
    kustomize.toolkit.fluxcd.io/force: enabled
    # postgres-init is configured exclusively via env vars (INIT_POSTGRES_*); it has no
    # file-based config, so secrets-as-files does not apply.
    checkov.io/skip1: CKV_K8S_35=postgres-init only consumes configuration via environment variables
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
          envFrom:
            - secretRef:
                name: terrateam-db
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
