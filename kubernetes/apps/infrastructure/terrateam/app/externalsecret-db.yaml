---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# DB credentials for terrateam on the shared cluster-wide CNPG (database/postgres18).
# - `password` is consumed by the HelmRelease (terrateam.config.db.passwordSecretName).
# - the INIT_POSTGRES_* keys are consumed by the postgres-init Job (db-init-job.yaml),
#   which creates the terrateam database + role on postgres18 as the superuser.
# POSTGRES_PASSWORD comes from the `terrateam` 1Password item; the superuser creds come
# from the shared `cloudnative-pg` item (same as netbox/pocket-id/etc.).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: terrateam-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: terrateam-db
    template:
      engineVersion: v2
      data:
        password: "{{ .POSTGRES_PASSWORD }}"
        INIT_POSTGRES_HOST: postgres18-rw.database.svc.cluster.local
        INIT_POSTGRES_DBNAME: terrateam
        INIT_POSTGRES_USER: terrateam
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: terrateam
    - extract:
        key: cloudnative-pg
