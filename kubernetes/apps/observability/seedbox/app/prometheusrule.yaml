---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: seedbox.rules
spec:
  groups:
    # Combined availability reading. seedbox:up:ratio = fraction of the 5 tailnet
    # scrape sensors currently reachable (0..1). NB all 5 ride the same tailnet
    # egress, so this measures MONITORING-PATH health, not true box-up — the
    # independent public-IP blackbox probe (probe_success{job="seedbox-public"})
    # is the box-up anchor. Dashboards graph both for the overall picture.
    - name: seedbox.recording
      rules:
        - record: seedbox:up:ratio
          expr: avg(up{instance="seedbox"})
    - name: seedbox.rules
      rules:
        # TRUE box-down: the blackbox TCP probe to the box's PUBLIC IP (probe.yaml),
        # which does NOT traverse the tailnet. It stays up through DERP-relay scrape
        # blips and drops only when the box is genuinely unreachable — so this finally
        # means "box down", not "scrape path flapped" (the old up{seedbox-node}==0 keyed
        # on the tailnet scrape and false-paged ~43x/week; that failure mode is now the
        # SeedboxScrapePathDegraded warning below).
        - alert: SeedboxDown
          annotations:
            summary: "Seedbox unreachable on its public IP for 5m — box is genuinely down (independent of the tailnet scrape path)."
          expr: |-
            probe_success{job="seedbox-public"} == 0
          for: 5m
          labels:
            severity: critical
        # Box IS reachable on its public IP, but some/all tailnet metric scrapes are
        # failing — a monitoring blind spot (DERP-relay flakiness / box I/O starving
        # tailscaled), NOT an outage. This is what used to page as SeedboxDown; it is a
        # warning now. `and on()` gates it on the box being up so it does not double-fire
        # with SeedboxDown during a real outage.
        - alert: SeedboxScrapePathDegraded
          annotations:
            summary: "Seedbox reachable on public IP but only {{ $value | humanizePercentage }} of tailnet scrapes are up for 20m — monitoring path degraded, not an outage."
          expr: |-
            (avg(up{instance="seedbox"}) < 1)
            and on()
            (probe_success{job="seedbox-public"} == 1)
          for: 20m
          labels:
            severity: warning
        # The box can be up while the exporter's egress path to the qBittorrent
        # WebUI is broken; the existing QbittorrentExporterDown alert keys on
        # instance="qbittorrent" so it does not cover this scrape.
        # The in-cluster exporter reaches the box's qBit WebUI over the same tailnet
        # egress, so up==0 also flaps when qBit's API is slow (RAID-scrub iowait) or the
        # path blips — not only when the exporter is truly down. for:20m rides that out
        # (matches SeedboxDown); high-cardinality is off (helmrelease.yaml) so the qBit
        # query no longer times out.
        - alert: SeedboxQbittorrentExporterDown
          annotations:
            summary: "Seedbox qBittorrent exporter unscrapeable for 20m — exporter down, qBit API slow, or tailnet path to the WebUI degraded."
          expr: |-
            up{job="seedbox-qbittorrent"} == 0
          for: 20m
          labels:
            severity: warning
        # Prometheus retention is 14d → a calendar-month sum is not computable.
        # These are PACE alerts: 7-day in+out volume extrapolated to 30 days.
        # Under-reads until the series has 7d of history (and after series
        # churn); vnstat covers the gap.
        # vnstat on the box is the authoritative calendar-month counter
        # (docker exec vnstat vnstat -i eno0 -m). Seedhost counts BOTH directions
        # against the 100 TB/mo cap. 1 TB here = 1e12 bytes (decimal, provider-style).
        - alert: SeedboxTrafficPaceCritical
          annotations:
            summary: "Seedbox on pace for {{ $value | humanize }}B/mo — 100 TB cap at risk."
          expr: |-
            (
              increase(node_network_receive_bytes_total{job="seedbox-node",device="eno0"}[7d])
              + increase(node_network_transmit_bytes_total{job="seedbox-node",device="eno0"}[7d])
            ) * 30 / 7 > 95e12
          for: 6h
          labels:
            severity: critical
        - alert: SeedboxTrafficPaceHigh
          annotations:
            summary: "Seedbox on pace for {{ $value | humanize }}B/mo (warn at 80 TB/mo pace)."
          expr: |-
            (
              increase(node_network_receive_bytes_total{job="seedbox-node",device="eno0"}[7d])
              + increase(node_network_transmit_bytes_total{job="seedbox-node",device="eno0"}[7d])
            ) * 30 / 7 > 80e12
          for: 6h
          labels:
            severity: warning
        - alert: SeedboxRAIDDegraded
          annotations:
            summary: "Seedbox md4 RAID5 is degraded ({{ $labels.state }}={{ $value }} disks)."
          expr: |-
            node_md_disks{job="seedbox-node",device="md4",state="failed"} > 0
            or node_md_disks{job="seedbox-node",device="md4",state="active"} < 4
          for: 5m
          labels:
            severity: critical
        - alert: SeedboxDiskFillHigh
          annotations:
            summary: "Seedbox rootfs above 85% ({{ $value | humanizePercentage }} used)."
          expr: |-
            1 - (
              node_filesystem_avail_bytes{job="seedbox-node",mountpoint="/"}
              / node_filesystem_size_bytes{job="seedbox-node",mountpoint="/"}
            ) > 0.85
          for: 30m
          labels:
            severity: warning
        # Steady-state seeding is iowait-heavy: the observed live working band
        # is p50≈0.45 / p90≈0.56 / max≈0.66, and Alertmanager routes every
        # firing alert to Pushover (info is not a quiet tier), so the threshold
        # sits above the working band rather than at "textbook" 40%.
        - alert: SeedboxIOWaitSustained
          annotations:
            summary: "Seedbox iowait above 75% for 2h — array saturated."
          expr: |-
            avg(rate(node_cpu_seconds_total{job="seedbox-node",mode="iowait"}[10m])) > 0.75
          for: 2h
          labels:
            severity: info
