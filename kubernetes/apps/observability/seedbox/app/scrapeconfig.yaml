---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: &name seedbox-node
spec:
  staticConfigs:
    - targets:
        - seedbox.observability.svc.cluster.local:9100
  metricsPath: /metrics
  scrapeInterval: 60s
  relabelings:
    - action: replace
      targetLabel: job
      replacement: *name
    - action: replace
      targetLabel: instance
      replacement: seedbox
