---
apiVersion: v1
kind: ConfigMap
metadata:
  name: peanut-config
  namespace: observability
data:
  # Points at the external NUT appliance (${NUT_SERVER_ADDR}), not the retired
  # in-cluster upsd.
  #
  # No USERNAME/PASSWORD: reading variables over the NUT protocol is anonymous.
  # Verified against the appliance rather than assumed — PeaNUT 6.0.0 returns a
  # full device list and metrics with NO credentials configured at all, and also
  # with deliberately wrong ones, because upsd answers `OK` to USERNAME/PASSWORD
  # for any user and only validates at LOGIN/SET/INSTCMD. The credential this
  # previously carried therefore authenticated nothing. If PeaNUT is ever wanted
  # for issuing instant commands, add a real user to the appliance's upsd.users
  # first (LukeEvansTech/nut-apps) and reinstate the fields together.
  settings.yml: |-
    NUT_SERVERS:
      - HOST: ${NUT_SERVER_ADDR}
        PORT: 3493
