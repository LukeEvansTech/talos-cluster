---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  values:
    fullnameOverride: victoria-logs
    server:
      resources:
        requests:
          cpu: 10m
          memory: 1Gi
        limits:
          memory: 2Gi
      persistentVolume:
        enabled: true
        storageClass: ceph-block
        size: 100Gi
      retentionPeriod: 28d
      route:
        enabled: true
        hostnames:
          - victorialogs.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        extraRules:
          - matches:
              - path:
                  type: Exact
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
    serviceMonitor:
      enabled: true
    dashboards:
      enabled: true
    extraObjects:
      # Dedicated ClusterIP Service for the tailscale-operator: the chart's own
      # victoria-logs-server Service is headless (clusterIP: None, StatefulSet
      # default) which the operator rejects ("headless Services are not
      # supported"), and clusterIP is immutable so the existing Service can't be
      # converted in place. The operator publishes this Service as a tailnet
      # device so the seedbox's Vector can push logs (pods/LAN unaffected).
      - apiVersion: v1
        kind: Service
        metadata:
          name: victoria-logs-tailnet
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: victoria-logs
        spec:
          type: ClusterIP
          selector:
            app: server
            app.kubernetes.io/instance: victoria-logs
            app.kubernetes.io/name: victoria-logs-single
          ports:
            - name: http
              port: 9428
              protocol: TCP
              targetPort: http
