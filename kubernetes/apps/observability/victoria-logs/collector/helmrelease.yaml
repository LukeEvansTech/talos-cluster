---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  values:
    fullnameOverride: victoria-logs-collector
    global:
      image:
        registry: quay.io
    podMonitor:
      enabled: true
    remoteWrite:
      - url: http://victoria-logs.observability.svc.cluster.local:9428
        maxDiskUsagePerURL: 10GB
    collector:
      # Stream fields define VictoriaLogs stream cardinality — keep this set small
      # and low-cardinality for efficient storage/querying.
      streamFields:
        - kubernetes.pod_name
        - kubernetes.pod_namespace
        - kubernetes.container_name
        - kubernetes.pod_labels.app.kubernetes.io/name
    extraArgs:
      # Strip ANSI colour codes from the log message body for grep-ability.
      "kubernetesCollector.decolorizeFields": _msg
