---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mktxp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mktxp-secret
    template:
      # Render the full mktxp config dir. The dedicated read-only RouterOS user
      # (group prometheus, policy api,read) connects over api-ssl (8729) — the
      # switches present a self-signed cert, hence ssl_certificate_verify=False.
      data:
        mktxp.conf: |
          [default]
              username = {{ .username }}
              password = {{ .password }}
              port = 8729
              use_ssl = True
              no_ssl_certificate = False
              ssl_certificate_verify = False
              plaintext_login = True
              enabled = True
              # CRS354 switches: no wireless/capsman/DNS, but switch-port + PoE matter.
              wireless = False
              wireless_clients = False
              capsman = False
              capsman_clients = False
              netwatch = False
              public_ip = False
              dns = False
              user = False
              switch_port = True
              poe = True

          # Hostnames are cluster-settings vars (Flux substitutes ${...} before
          # ESO renders the {{ }} fields) — DNS names, not hardcoded IPs.
          [CRS354-PoE]
              hostname = ${MIKROTIK_POE_ADDR}

          [CRS354-NonPoE]
              hostname = ${MIKROTIK_NONPOE_ADDR}
              poe = False
        _mktxp.conf: |
          # mktxp requires the full [MKTXP] key set (it reads keys like
          # compact_default_conf_values without a default). Overrides from the
          # upstream defaults: listen, parallel fetch, no on-disk dhcp cache
          # (config dir is a read-only secret mount).
          [MKTXP]
              listen = '0.0.0.0:49090'
              socket_timeout = 5
              initial_delay_on_failure = 120
              max_delay_on_failure = 900
              delay_inc_div = 5
              bandwidth = False
              bandwidth_test_dns_server = 8.8.8.8
              bandwidth_test_interval = 600
              minimal_collect_interval = 5
              verbose_mode = False
              fetch_routers_in_parallel = True
              max_worker_threads = 5
              max_scrape_duration = 30
              total_max_scrape_duration = 90
              http_server_threads = 16
              persistent_router_connection_pool = True
              persistent_dhcp_cache = False
              compact_default_conf_values = False
              prometheus_headers_deduplication = False
              probe_connection_pool = False
              probe_connection_pool_ttl = 300
              probe_connection_pool_max_size = 128
  dataFrom:
    - extract:
        key: mktxp
