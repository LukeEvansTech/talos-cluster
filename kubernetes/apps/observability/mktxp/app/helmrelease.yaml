---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mktxp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mktxp:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # mktxp normalizes its config on load (writes back to mktxp.conf). Copy
          # the secret-rendered config into a writable emptyDir so that write
          # succeeds instead of erroring against a read-only secret mount.
          init-config:
            image:
              repository: ghcr.io/akpw/mktxp
              tag: v1.2.17
              digest: sha256:bd6f22f7db0a79557c4af8a73aa22517f4c32d54fafa19fb0de29e7332440613
            command:
              - "sh"
              - "-c"
              - "cp -f /config-src/mktxp.conf /config-src/_mktxp.conf /etc/mktxp/"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: ghcr.io/akpw/mktxp
              tag: v1.2.17
              digest: sha256:bd6f22f7db0a79557c4af8a73aa22517f4c32d54fafa19fb0de29e7332440613
            command:
              - "mktxp"
              - "--cfg-dir"
              - "/etc/mktxp"
              - "export"
            env:
              TZ: ${TIMEZONE:=UTC}
              HOME: /tmp
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    persistence:
      # Secret-rendered config (mktxp.conf + _mktxp.conf), mounted read-only on
      # the init container only; it copies into the writable `config` emptyDir.
      config-src:
        type: secret
        name: mktxp-secret
        advancedMounts:
          mktxp:
            init-config:
              - path: /config-src
                readOnly: true
      # Writable config dir mktxp reads from (and rewrites on load).
      config:
        type: emptyDir
        globalMounts:
          - path: /etc/mktxp
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: *app
        ports:
          metrics:
            port: 49090
            protocol: TCP
