---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oxidized-config
  namespace: observability
data:
  config: |-
    ---
    username: placeholder
    password: placeholder
    model: routeros
    interval: 86400
    log: /home/oxidized/.config/oxidized/oxidized.log
    debug: false
    threads: 6
    timeout: 30
    retries: 2
    rest: 0.0.0.0:8888
    prompt: !ruby/regexp /^([\w.@-]+[#>]\s?)$/

    input:
      default: ssh
      ssh:
        secure: false

    output:
      default: git
      git:
        user: Oxidized
        email: oxidized@${SECRET_DOMAIN}
        repo: /home/oxidized/.config/oxidized/devices.git

    source:
      default: csv
      csv:
        file: /etc/oxidized/router.db.d/router.db
        delimiter: !ruby/regexp /:/
        map:
          name: 0
          ip: 1
          model: 2
          username: 3
          password: 4

    hooks:
      push_to_github:
        # System git over SSH instead of the githubrepo hook (rugged/libgit2),
        # which fails against current GitHub with
        # 'Rugged::SshError: remote rejected authentication'. The system
        # git+ssh client uses ~/.ssh/{id_ed25519,known_hosts} prepared by
        # the ssh-setup init container.
        type: exec
        events: [post_store]
        cmd: |
          set -e
          cd /home/oxidized/.config/oxidized/devices.git
          git remote get-url origin >/dev/null 2>&1 \
            || git remote add origin git@github.com:LukeEvansTech/network-configs.git
          git push -u origin master 2>&1
      pushover_drift:
        type: exec
        events: [post_store]
        cmd: |
          curl -s --form-string "token=$PUSHOVER_TOKEN" \
                  --form-string "user=$PUSHOVER_USER_KEY" \
                  --form-string "title=Oxidized: config drift" \
                  --form-string "message=$OX_NODE_NAME ($OX_NODE_MODEL) changed" \
                  https://api.pushover.net/1/messages.json
      pushover_fail:
        type: exec
        events: [node_fail]
        cmd: |
          curl -s --form-string "token=$PUSHOVER_TOKEN" \
                  --form-string "user=$PUSHOVER_USER_KEY" \
                  --form-string "title=Oxidized: poll failed" \
                  --form-string "priority=1" \
                  --form-string "message=$OX_NODE_NAME ($OX_NODE_MODEL) — $OX_NODE_MSG" \
                  https://api.pushover.net/1/messages.json
