---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
# nut-exporter is a PROXY: the scrape target is the exporter's own Service, and
# the NUT server it reads is passed per-endpoint in `params.target`. That NUT
# server is now the external appliance (${NUT_SERVER_ADDR}), not the retired
# in-cluster upsd — the appliance has to outlive the cluster it shuts down.
# Reading NUT variables is anonymous, so no credential is involved here.
kind: ServiceMonitor
metadata:
  name: &app nut-exporter
  labels:
    app.kubernetes.io/name: *app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      params:
        target:
          - ${NUT_SERVER_ADDR}:3493
        ups:
          - cr-ups-main
      metricRelabelings:
        - action: replace
          sourceLabels:
            - __address__
          targetLabel: instance
          replacement: cr-ups-main
        - action: labeldrop
          regex: pod
    - port: metrics
      interval: 30s
      path: /metrics
      params:
        target:
          - ${NUT_SERVER_ADDR}:3493
        ups:
          - cr-ups-comms
      metricRelabelings:
        - action: replace
          sourceLabels:
            - __address__
          targetLabel: instance
          replacement: cr-ups-comms
        - action: labeldrop
          regex: pod
