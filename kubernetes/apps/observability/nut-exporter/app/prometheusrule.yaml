---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nut-exporter
spec:
  groups:
    - name: nut-exporter
      rules:
        # UPS monitoring is blind — nut-exporter returns no metrics for >3m.
        # When the NUT server is down/unreachable the exporter fails its whole
        # scrape, so up == 0 (verified); `absent()` covers the target vanishing
        # entirely. 3m (not the 15m built-in TargetDown) because the main UPS
        # battery measures only ~13m at present load — see UPSBatteryRuntimeLow.
        #
        # The NUT server is now an appliance OUTSIDE the cluster, so this alert
        # additionally covers the LAN path to it, not just a pod.
        - alert: UPSUnreachable
          annotations:
            description: >-
              nut-exporter has had no successful scrape for over 3 minutes (up == 0 or
              target absent). The external NUT appliance is likely down or unreachable,
              so UPS state is invisible during a power event.
            summary: UPS monitoring is blind — nut-exporter is not returning UPS metrics.
          expr: up{job="nut-exporter"} == 0 or absent(up{job="nut-exporter"})
          for: 3m
          labels:
            severity: critical
            pushover_priority: emergency
        # Mains lost — fires within ~1m. `max by (ups)` collapses the ServiceMonitor's
        # instance cross-product to one alert per real UPS.
        - alert: UPSOnBattery
          annotations:
            description: >-
              UPS {{ $labels.ups }} switched to battery (status OB). Mains input is lost
              and battery runtime is finite — investigate immediately.
            summary: UPS {{ $labels.ups }} is on battery — mains power lost.
          expr: max by (ups) (nut_ups_status{status="OB"}) == 1
          for: 30s
          labels:
            severity: critical
            pushover_priority: emergency
        # On battery AND (runtime < 5m OR charge < 50%). by(ups) aggregation also fixes
        # the old UpsLowRuntime, whose `status`-labelled `and` operand never matched.
        #
        # Threshold was 900s (15m) and had to come down: the main UPS reports only
        # ~780s runtime on a FULL battery (2008-vintage cells at ~25% load), so a
        # 15m test was true the instant it went on battery and this alert was an
        # exact duplicate of UPSOnBattery rather than an escalation of it. 300s is
        # below any plausible full-charge runtime for either UPS, so it once again
        # means what it says: the battery is nearly gone.
        - alert: UPSBatteryRuntimeLow
          annotations:
            description: >-
              UPS {{ $labels.ups }} is on battery with under 5 minutes runtime remaining
              or charge below 50%. Shutdown is imminent.
            summary: UPS {{ $labels.ups }} battery is nearly exhausted.
          expr: (max by (ups) (nut_ups_status{status="OB"}) == 1) and ((min by (ups) (nut_battery_runtime_seconds) < 300) or (min by (ups) (nut_battery_charge) < 0.5))
          for: 30s
          labels:
            severity: critical
            pushover_priority: emergency
        # One snmp-ups driver can fail while upsd and the other driver keep
        # serving, so that UPS's metrics vanish on their own and UPSUnreachable
        # (which needs the whole scrape to fail) never fires. absent() carries
        # the ups label from its matcher, so this stays per-UPS.
        #
        # This matters MORE since the move to the appliance, not less: the
        # retired in-cluster deployment isolated each driver in its own
        # container, whereas the appliance runs both under one entrypoint. This
        # is the only rule that catches a single UPS going quiet.
        - alert: UPSMetricsMissing
          annotations:
            description: >-
              No nut_ups_status metrics for UPS {{ $labels.ups }} for over 5 minutes.
              Its snmp-ups driver container is likely crashlooping or the UPS
              management card is unreachable, so this UPS is unmonitored.
            summary: UPS {{ $labels.ups }} is not reporting metrics.
          expr: absent(nut_ups_status{ups="cr-ups-main"}) or absent(nut_ups_status{ups="cr-ups-comms"})
          for: 5m
          labels:
            severity: critical
        # A UPS can shut its output down during an outage and never restart it
        # (seen 2026-07-14: mains restored, battery 100%, output 0V, downstream
        # devices dark) — no other rule covers status OFF.
        - alert: UPSOutputOff
          annotations:
            description: >-
              UPS {{ $labels.ups }} reports status OFF — its output is switched off
              and everything downstream is unpowered. It will not restart output by
              itself; power it back on at the front panel.
            summary: UPS {{ $labels.ups }} output is OFF — downstream load is dark.
          expr: max by (ups) (nut_ups_status{status="OFF"}) == 1
          for: 2m
          labels:
            severity: critical
        - alert: UpsLowBattery
          annotations:
            description: UPS {{ $labels.ups }} battery charge is {{ $value | humanizePercentage }} which is below 50%.
            summary: UPS battery is low.
          expr: nut_battery_charge < 0.5
          for: 5m
          labels:
            severity: warning
        - alert: UpsBatteryReplace
          annotations:
            description: UPS {{ $labels.ups }} battery needs replacement.
            summary: Replace UPS battery.
          expr: nut_ups_status{status="RB"} == 1
          for: 10s
          labels:
            severity: critical
        - alert: UpsHighLoad
          annotations:
            description: UPS {{ $labels.ups }} load is {{ $value | humanizePercentage }} which is above 80%.
            summary: UPS load is high.
          expr: nut_load > 0.8
          for: 5m
          labels:
            severity: warning
        - alert: UpsOverload
          annotations:
            description: UPS {{ $labels.ups }} is overloaded at {{ $value | humanizePercentage }}.
            summary: UPS is overloaded.
          expr: nut_load > 0.95
          for: 1m
          labels:
            severity: critical
