---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app snmp-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus-snmp-exporter
  values:
    fullnameOverride: *app
    image:
      repository: quay.io/prometheus/snmp-exporter
      tag: v0.30.1@sha256:e5fd5e8b43ace6c088fe9bf0b37b7fff0e04380bee352be7ec41b853a4dd5859
    # Merge a custom ENTITY-SENSOR-MIB module (temp/fan/PSU/optics) plus the
    # auths file rendered from external-secrets alongside the image's bundled
    # snmp.yml. snmp_exporter combines multiple --config.file.
    extraArgs:
      - --config.file=/etc/snmp_exporter/snmp.yml
      - --config.file=/run/snmp-extra/snmp.yml
      - --config.file=/run/snmp-printer/snmp.yml
      - --config.file=/run/snmp-auth/snmp.yml
    extraConfigmapMounts:
      - name: entity-sensor
        configMap: snmp-exporter-entity-sensor
        mountPath: /run/snmp-extra
        readOnly: true
      - name: brother-printer
        configMap: snmp-exporter-brother-printer
        mountPath: /run/snmp-printer
        readOnly: true
    # Credentials only (auths:) — templated by the snmp-exporter ExternalSecret
    # so no community string lives in git (public repo).
    extraSecretMounts:
      - name: auth
        secretName: snmp-exporter-auth
        mountPath: /run/snmp-auth
        readOnly: true
    # chart 9.14.0 reads scrape targets from serviceMonitor.params[] (not a
    # top-level params:); per-entry module/auth fall back to the globals here.
    serviceMonitor:
      enabled: true
      path: /snmp
      module:
        - if_mib
      auth:
        - public_v2
      params:
        # the core switch. if_mib gives all port
        # counters/status; entity_sensor adds temp/fan/PSU/optics. auth onyx_ro
        # is a dedicated RO community defined via the ExternalSecret.
        - name: onyx-core
          target: ${ONYX_ADDR}
          module:
            - if_mib
            - entity_sensor
          auth:
            - onyx_ro
          interval: 60s
          scrapeTimeout: 30s
          relabelings:
            - sourceLabels:
                - __param_target
              targetLabel: instance
        # Brother printer fleet on PRINT VLAN 72. if_mib gives link/oper status;
        # brother_printer adds supplies/page-count/printer-status. Each carries a
        # device_class=printer label so the noisy label printers (which power
        # themselves off) are excluded from the critical SnmpTargetDown alert and
        # get supply/fault alerts instead. SNMPv3 authPriv per-device auths.
        - name: printer-hl
          target: ${PRINTER_HL_ADDR}
          module:
            - if_mib
            - brother_printer
          auth:
            - printer_hl
          interval: 120s
          scrapeTimeout: 30s
          relabelings:
            - sourceLabels:
                - __param_target
              targetLabel: instance
            - targetLabel: device_class
              replacement: printer
        - name: printer-mfc
          target: ${PRINTER_MFC_ADDR}
          module:
            - if_mib
            - brother_printer
          auth:
            - printer_mfc
          interval: 120s
          scrapeTimeout: 30s
          relabelings:
            - sourceLabels:
                - __param_target
              targetLabel: instance
            - targetLabel: device_class
              replacement: printer
        - name: printer-ql
          target: ${PRINTER_QL_ADDR}
          module:
            - if_mib
            - brother_printer
          auth:
            - printer_ql
          interval: 120s
          scrapeTimeout: 30s
          relabelings:
            - sourceLabels:
                - __param_target
              targetLabel: instance
            - targetLabel: device_class
              replacement: printer
        - name: printer-pt
          target: ${PRINTER_PT_ADDR}
          module:
            - if_mib
            - brother_printer
          auth:
            - printer_pt
          interval: 120s
          scrapeTimeout: 30s
          relabelings:
            - sourceLabels:
                - __param_target
              targetLabel: instance
            - targetLabel: device_class
              replacement: printer
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  # snmp_exporter only reads its --config.file set at startup, so changes to the
  # auth Secret / entity-sensor ConfigMap otherwise need a manual rollout restart.
  # Chart 9.14.1 has no Deployment-level annotations value; patch the annotation
  # in (same pattern as headlamp).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: snmp-exporter
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: snmp-exporter
                annotations:
                  reloader.stakater.com/auto: "true"
