---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: brother-printers
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  # Fleet view for the 4 Brother printers (device_class=printer). Supply % is
  # drum/belt only — Brother reports toner level as -3 (present, no number), so
  # the panel filters to MaxCapacity>0 and Level>=0. Status/pages/reachability
  # cover all 4. No template var: small fixed fleet, shown all at once.
  json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": [
        "snmp",
        "printer"
      ],
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Brother Printers (SNMP)",
      "uid": "snmp-brother-printers",
      "templating": {
        "list": []
      },
      "panels": [
        {
          "type": "row",
          "title": "Printer fleet",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false,
          "id": 1,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Reachable",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "up{job=\"snmp-exporter\", device_class=\"printer\"}",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "color": "red"
                    },
                    "1": {
                      "text": "UP",
                      "color": "green"
                    }
                  }
                }
              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "id": 2,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Device status",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "hrDeviceStatus{job=\"snmp-exporter\", device_class=\"printer\"}",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "unknown",
                      "color": "text"
                    },
                    "2": {
                      "text": "running",
                      "color": "green"
                    },
                    "3": {
                      "text": "WARNING",
                      "color": "yellow"
                    },
                    "4": {
                      "text": "testing",
                      "color": "blue"
                    },
                    "5": {
                      "text": "DOWN",
                      "color": "red"
                    }
                  }
                }
              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "id": 3,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Pages printed (life)",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "prtMarkerLifeCount{job=\"snmp-exporter\", device_class=\"printer\"}",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "none",
            "graphMode": "area",
            "textMode": "value_and_name",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "id": 4,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "stat",
          "title": "Supplies < 20%",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count((prtMarkerSuppliesLevel{job=\"snmp-exporter\", device_class=\"printer\"} / prtMarkerSuppliesMaxCapacity{job=\"snmp-exporter\", device_class=\"printer\"} < 0.20) and (prtMarkerSuppliesMaxCapacity{job=\"snmp-exporter\", device_class=\"printer\"} > 0) and (prtMarkerSuppliesLevel{job=\"snmp-exporter\", device_class=\"printer\"} >= 0)) or on() vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "id": 5,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "bargauge",
          "title": "Supply remaining % (drum/belt \u2014 Brother reports toner as -3, no %)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (prtMarkerSuppliesLevel{job=\"snmp-exporter\", device_class=\"printer\"} / prtMarkerSuppliesMaxCapacity{job=\"snmp-exporter\", device_class=\"printer\"}) and (prtMarkerSuppliesMaxCapacity{job=\"snmp-exporter\", device_class=\"printer\"} > 0) and (prtMarkerSuppliesLevel{job=\"snmp-exporter\", device_class=\"printer\"} >= 0)",
              "refId": "A",
              "legendFormat": "{{instance}} \u2014 {{prtMarkerSuppliesDescription}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 10
                  },
                  {
                    "color": "green",
                    "value": 25
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "id": 6,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Pages printed over time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "prtMarkerLifeCount{job=\"snmp-exporter\", device_class=\"printer\"}",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "fillOpacity": 10
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "id": 7,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "type": "timeseries",
          "title": "Device status over time (2=running 3=warning 5=down)",
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 13
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "hrDeviceStatus{job=\"snmp-exporter\", device_class=\"printer\"}",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "fillOpacity": 10,
                "pointSize": 5
              },
              "min": 0,
              "max": 5
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "id": 8,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        }
      ]
    }
