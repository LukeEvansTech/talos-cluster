---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Gatus - Health monitoring and alerting. The gatus-sidecar chart bundles
# gatus + the endpoint-discovery sidecar (and their RBAC), replacing the
# app-template + initContainer wiring (upstream home-ops #11077). Images are
# chart-managed: the sidecar is digest-pinned per chart release, gatus is
# tag-pinned as the chart appVersion.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gatus
  values:
    # Release "gatus" + chart "gatus-sidecar" would otherwise render resource
    # names as gatus-gatus-sidecar (helper only collapses when the release
    # name CONTAINS the chart name).
    fullnameOverride: gatus
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: ${TIMEZONE}
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - status.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-external
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: true
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi
    resources:
      # Pod-level budget shared by gatus + sidecar (needs k8s ≥1.34; the
      # chart's kubeVersion enforces it).
      requests:
        cpu: 100m
      limits:
        memory: 512Mi
