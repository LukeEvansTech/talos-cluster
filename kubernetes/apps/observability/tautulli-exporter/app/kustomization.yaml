---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./prometheusrule.yaml
  - ./servicemonitor.yaml
configMapGenerator:
  - name: tautulli-exporter-dashboard
    files:
      - tautulli.json=./dashboards/tautulli.json
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # Dashboard JSON uses Grafana ${DS_PROMETHEUS} macros; disable Flux postBuild
    # substitution so they are not clobbered to empty.
    kustomize.toolkit.fluxcd.io/substitute: disabled
