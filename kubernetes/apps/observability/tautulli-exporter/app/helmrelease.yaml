---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tautulli-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      tautulli-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mm404/tautulli-exporter
              tag: 0.2.7@sha256:d7aaeeb02039af6c802e1cb66a204326515af72dab04bdcb6184c6a10da014d2
            env:
              # Tautulli's in-cluster API (media namespace). The exporter appends
              # /api/v2 itself; a read-only API key is supplied via envFrom.
              TAUTULLI_URL: http://tautulli.media.svc.cluster.local
              METRICS_PORT: &port 8000
              LOG_LEVEL: INFO
            envFrom:
              - secretRef:
                  name: tautulli-exporter-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          metrics:
            port: *port
            protocol: TCP
