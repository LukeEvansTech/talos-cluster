---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vmware-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vmware-exporter-secret
    template:
      data:
        # Mapped to pryorda/vmware_exporter's expected env var names (envFrom below).
        # Backed by the `vsphere-monitoring` 1Password Login item — a DEDICATED
        # READ-ONLY vCenter account (least privilege — NOT the Terraform admin in
        # `vsphere-terraform`). The vCenter host is the non-secret
        # ${SECRET_VSPHERE_ENDPOINT} substitution, not stored here.
        VSPHERE_USER: "{{ .username }}"
        VSPHERE_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: vsphere-monitoring
