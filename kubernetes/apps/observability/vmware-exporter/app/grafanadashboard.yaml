---
# Vendored from pryorda/vmware_exporter v0.18.4 (dashboards/*.json):
# https://github.com/pryorda/vmware_exporter/tree/v0.18.4/dashboards
# These were previously imported via `url:`, but the upstream JSON hard-codes its
# `$datasource` template variable to "Prometheus" (capital), which does not match
# this cluster's datasource (name `prometheus`) — so every panel rendered blank.
# Vendoring lets us pin that variable to `prometheus` (configMapGenerator carries
# substitute:disabled so Flux postBuild leaves the dashboard macros intact).
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: vmware-exporter-cluster
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  resyncPeriod: 1h
  configMapRef:
    name: vmware-exporter-dashboards
    key: cluster.json
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: vmware-exporter-esxi
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  resyncPeriod: 1h
  configMapRef:
    name: vmware-exporter-dashboards
    key: esxi.json
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: vmware-exporter-virtualmachine
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  resyncPeriod: 1h
  configMapRef:
    name: vmware-exporter-dashboards
    key: virtualmachine.json
