---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opnsense-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      opnsense-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/athennamind/opnsense-exporter
              tag: "0.0.16"
              digest: sha256:64469206eb955b6c87ec2737cd4884b0bec01b518408cf1ac6d5c153f6c0cf1f
            env:
              # OPS_API / OPS_API_KEY / OPS_API_SECRET come from the secret (envFrom).
              OPNSENSE_EXPORTER_OPS_PROTOCOL: https
              # OPNsense ships a self-signed cert by default — skip verification.
              OPNSENSE_EXPORTER_OPS_INSECURE: "true"
              OPNSENSE_EXPORTER_INSTANCE_LABEL: opnsense
              OPNSENSE_EXPORTER_WEB_LISTEN_ADDRESS: :8080
              # api/unbound/diagnostics/stats returns an empty body on this
              # OPNsense version (the collector errors `parsing '' to int` every
              # scrape; enabling unbound extended-statistics did not change it).
              # No metrics are lost — the endpoint yields nothing either way — so
              # disable the broken collector to keep the logs clean.
              OPNSENSE_EXPORTER_DISABLE_UNBOUND: "true"
            envFrom:
              - secretRef:
                  name: opnsense-exporter-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        controller: *app
        ports:
          metrics:
            port: 8080
            protocol: TCP
