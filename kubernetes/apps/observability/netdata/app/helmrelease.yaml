---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
spec:
  interval: 1h
  chart:
    spec:
      chart: netdata
      version: 3.7.165
      sourceRef:
        kind: HelmRepository
        name: netdata
      interval: 1h
  values:
    image:
      repository: netdata/netdata
      tag: v2.10.3@sha256:bcc822ec685dd7ee488e9f99b957f479b66301be04f13f346df692ad7de94151

    ingress:
      enabled: false

    parent:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 4Gi
        limits:
          memory: 16Gi
      alarms:
        persistence: true
        storageclass: ceph-block
        volumesize: 1Gi
      database:
        persistence: true
        storageclass: ceph-block
        volumesize: 20Gi

    child:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 2Gi
        limits:
          memory: 8Gi

    k8sState:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 256Mi
        limits:
          memory: 1Gi
      persistence:
        enabled: true
        storageclass: ceph-block
        volumesize: 1Gi
