---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  backend:
    filesystem:
      # `path` is the volume MOUNTPOINT inside mover pods (the repo lives at
      # its root), so isolation from the volsync kopia repo at the export
      # root must happen at the NFS layer: mount the /kopiur subdirectory of
      # the export (pre-created on the NAS). Promote to a dedicated TrueNAS
      # dataset if the trial sticks.
      path: /repo
      volume:
        nfs:
          server: ${SECRET_STORAGE_SERVER}
          path: ${SECRET_STORAGE_SERVER_VOLSYNC_NFS}/kopiur
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  create:
    enabled: true
  # credentialProjection dropped (0.6.0 still supports it): movers now read
  # KOPIA_PASSWORD from a per-namespace ExternalSecret (components/kopiur/secret)
  # dropped into each backup namespace, rather than the operator copying it in.
  allowedNamespaces:
    # Trial scope: the namespace holding the trial apps (apprise, atuin) PLUS
    # the operator's own namespace — the managed Maintenance CR is created in
    # kopiur-system and is webhook-gated by this same list. Widen after the
    # evaluation period.
    list:
      - default
      - kopiur-system
  identityDefaults:
    # Unchanged from the 0.4.x trial so existing snapshots stay addressable
    # under the same kopia identity across the bump.
    hostnameExpr: namespace
    usernameExpr: namespace + '-' + policyName
  scheduleDefaults:
    # Timezone now lives here (DRY) instead of per SnapshotSchedule.
    timezone: Europe/London
  moverDefaults:
    # Tiny ephemeral cache/scratch on node-local storage — kopia needs a cache
    # dir but the repo is remote (NFS), so movers don't need real PVCs.
    cache:
      capacity: 1Mi
      mode: Ephemeral
      storageClassName: openebs-hostpath
    scratch:
      capacity: 1Mi
      storageClassName: openebs-hostpath
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    ttlSecondsAfterFinished: 86400
  maintenance:
    enabled: true
