---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kopiur
  values:
    installScope: cluster
    grafanaDashboard:
      enabled: true
      grafanaOperator:
        enabled: true
        matchLabels:
          grafana.internal/instance: grafana
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    secretProjection:
      enabled: true
    webhook:
      tls:
        mode: self
      serviceMonitor:
        enabled: true
