apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kopiur-system
components:
  - ../../components/global-vars
  - ../../components/alerts
resources:
  - ./namespace.yaml
  # Trial resumed on 0.7.0 (fresh install — the pause fully removed the
  # operator, CRDs, and CRs, so the 0.5.x→0.6.0 CRD keep-annotation migration
  # does not apply; 0.7.0's crds/ directory installs cleanly). The NAS repo
  # data survived the pause — the ClusterRepository reconnects to the same
  # /kopiur kopia repo under the unchanged identityDefaults.
  - ./kopiur/ks.yaml
