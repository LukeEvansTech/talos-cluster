---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tuppr
  values:
    replicaCount: 2
    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      # 768Mi (not 512Mi): steady state is ~320Mi, but on an apiserver
      # reconnect all informers re-LIST at once (Secrets/Pods/Nodes) and the
      # resync spike OOMKilled the follower at 512Mi. This headroom absorbs it.
      limits:
        memory: 768Mi
    monitoring:
      serviceMonitor:
        enabled: true
      # Keep our hand-tuned rules in upgrades/prometheusrule.yaml (thresholds
      # tuned to our tuppr powercycle/stuck-reboot history) instead of the chart's.
      prometheusRule:
        enabled: false
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
