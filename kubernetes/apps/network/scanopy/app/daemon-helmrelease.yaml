---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scanopy-daemon
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: scanopy
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      scanopy-daemon:
        # Single scanner (Deployment, 1 replica): the nodes share one flat LAN
        # (10.32.8.0/24), so a per-node DaemonSet would scan the same /24 three
        # times. Recreate avoids two hostNetwork pods contending for host port
        # 60073 during a rollout.
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/scanopy/scanopy/daemon
              tag: v0.16.2@sha256:98cdba02b2b127462cba87c10dacdc5671354e2dd43a124b72f8cfd2dfb4b911
            env:
              TZ: ${TIMEZONE}
              SCANOPY_LOG_LEVEL: info
              SCANOPY_SERVER_URL: http://scanopy.network.svc.cluster.local:60072
              SCANOPY_ENABLE_LOCAL_DOCKER_SOCKET: "false"
              # Restrict scanning to the physical LAN NIC. Without this the
              # hostNetwork daemon auto-scans every node interface — including
              # the Cilium pod/service CIDRs (10.42/10.43.0.0/16, ~131k IPs) —
              # and saturates node conntrack. enp1s0np0 = LAN 10.32.8.0/24
              # (same kernel name on all three nodes).
              SCANOPY_INTERFACES: enp1s0np0
              # Cap simultaneous host scans (default auto-detects ~10-20).
              SCANOPY_CONCURRENT_SCANS: "5"
              # Stable identity for the single scanner (was per-node nodeName).
              SCANOPY_NAME: scanopy-codelooks
            envFrom:
              - secretRef:
                  name: scanopy-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 60073
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    persistence:
      config:
        type: hostPath
        hostPath: /var/lib/scanopy-daemon
        globalMounts:
          - path: /root/.config/scanopy/daemon
      snmp-community:
        type: secret
        name: scanopy-snmp-secret
        globalMounts:
          - path: /run/secrets/snmp-community
            subPath: community
            readOnly: true
