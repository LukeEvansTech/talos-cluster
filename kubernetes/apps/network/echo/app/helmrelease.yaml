---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: echo
  values:
    replicaCount: 2
    config:
      # Upstream ships this on, but echo is public here and the block reports
      # pod/node/namespace to any caller. This cluster is long past the
      # fresh-bootstrap check the block serves, so keep it off.
      kubernetes: false
      # Trust the in-cluster Envoy Gateway proxy so echo reports the real client IP
      trustedProxies:
        - ${CLUSTER_PODS_CIDR}
    # External-only, matching the cluster-template: echo is the canary that
    # proves the public chain (external-dns -> DNS -> envoy-external -> wildcard
    # cert -> pod), so an internal route would not exercise anything.
    httpRoute:
      enabled: true
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
