---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: miroir
  values:
    # Warm-standby controller; leader election auto-enables above 1 replica.
    replicaCount: 2
    agent:
      # Must list every loopfile.baseDir used by MiroirNode specs — the chart
      # cannot read the topology CRs at render time.
      loopfileBaseDirs:
        - /var/mnt/extra/miroir
      # The busiest node (most loopfiles) bursts past the chart's 128Mi default
      # during the initial agent-volume reconcile sweep — steady state is ~27Mi,
      # but the sweep OOMKills the agent into CrashLoopBackOff. Raise the ceiling
      # (deep-merged over the chart's requests: cpu 10m / memory 32Mi).
      resources:
        limits:
          memory: 512Mi
    monitoring:
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
